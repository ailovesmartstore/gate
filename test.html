<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER CATALOG</title>
    <style>
        :root { --primary-color: #111; --accent-color: #ff5722; --bg-light: #f8f8f8; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--bg-light); -webkit-tap-highlight-color: transparent; }

        /* [메인 리스트] */
        .slide-container { display: flex; overflow-x: auto; gap: 15px; padding: 20px; scrollbar-width: none; }
        .product-card { flex: 0 0 150px; background: #fff; border-radius: 15px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .product-card img { width: 100%; border-radius: 10px; }

        /* [플로팅 메뉴] */
        .fab-container { position: fixed; bottom: 160px; right: 20px; z-index: 999999; }
        .fab-main { width: 60px; height: 60px; background: var(--primary-color); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; font-size: 12px; font-weight: bold; position: relative; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: var(--accent-color); color: #fff; font-size: 10px; padding: 3px 7px; border-radius: 10px; }

        /* [카테고리 & 오버레이] */
        .category-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 999998; }
        .category-menu { display: none; position: fixed; bottom: 230px; right: 20px; background: #fff; border-radius: 20px; width: 260px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 999999; overflow: hidden; }
        .menu-header { background: #f8f8f8; padding: 15px; font-weight: bold; border-bottom: 1px solid #eee; text-align: center; }
        .menu-item { padding: 15px; border-bottom: 1px solid #f9f9f9; font-size: 14px; cursor: pointer; text-align: center; }

        /* [모달 상세페이지] */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; overflow-y: auto; }
        #modal-img { display: block; width: 100%; max-width: 800px; margin: 0 auto; }

        /* [선택형 옵션 UI] */
        .option-section { padding: 20px; background: #fff; border-top: 1px solid #eee; }
        .opt-group { margin-bottom: 15px; }
        .opt-label { font-size: 12px; font-weight: bold; color: #888; margin-bottom: 8px; }
        .opt-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .chip.selected { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

        .btn-add-cart { width: 100%; padding: 16px; background: var(--primary-color); color: #fff; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* [추천 바] */
        .recommend-section { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 10px 0 40px; z-index: 40000; }
        .recommend-list { display: flex; overflow-x: auto; padding: 0 20px; gap: 10px; }
        .rec-item img { width: 90px; border-radius: 12px; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="slide-container" id="product-list"></div>

    <div class="category-overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="fab-container">
        <div class="category-menu" id="category-menu">
            <div class="menu-header">MY SHOPPING</div>
            <div id="menu-content"></div>
        </div>
        <div class="fab-main" onclick="toggleMenu()">
            <div class="cart-badge" id="cart-badge">0</div>
            MENU
        </div>
    </div>

    <div id="modal">
        <img id="modal-img" src="">
        
        <div class="option-section">
            <div class="opt-group">
                <div class="opt-label">색상 선택</div>
                <div class="opt-chips" id="color-chips"></div>
            </div>
            <div class="opt-group">
                <div class="opt-label">사이즈 선택</div>
                <div class="opt-chips" id="size-chips"></div>
            </div>
            <button class="btn-add-cart" onclick="addToOrder()">주문 리스트에 담기</button>
        </div>

        <div class="recommend-section">
            <div class="recommend-list" id="recommend-list"></div>
        </div>
        <div style="padding: 20px 20px 250px; text-align: center;">
            <div style="background:#eee; padding:15px; border-radius:30px; display:inline-block;" onclick="closeModal()">닫기</div>
        </div>
    </div>

    <script>
        let currentCode = "";
        let selectedColor = "";
        let selectedSize = "";
        let orderList = JSON.parse(localStorage.getItem('kids_order_list')) || [];

        // [데이터] 상품번호, 기본색상들, 사이즈들, 추천상품, 스토어링크
        const products = [
            { code: "566", colors: ["그린", "아이보리"], sizes: ["3호", "5호", "7호", "9호"], rec: ["565", "564"], link: "https://smartstore.naver.com/kidsriver/products/1" },
            { code: "565", colors: ["민트", "핑크", "노랑"], sizes: ["5호", "7호", "9호", "11호"], rec: ["566", "564"], link: "https://smartstore.naver.com/kidsriver/products/1" }
        ];

        function updateBadge() { document.getElementById('cart-badge').innerText = orderList.length; }

        function renderChips(containerId, data, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(item => `<div class="chip" onclick="selectChip(this, '${item}', '${type}')">${item}</div>`).join('');
        }

        function selectChip(el, value, type) {
            el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            if(type === 'color') selectedColor = value;
            if(type === 'size') selectedSize = value;
        }

        function addToOrder() {
            if(!selectedColor || !selectedSize) return alert("색상과 사이즈를 선택해 주세요!");
            const orderStr = `${currentCode}(${selectedColor}/${selectedSize})`;
            orderList.push(orderStr);
            localStorage.setItem('kids_order_list', JSON.stringify(orderList));
            updateBadge();
            alert("리스트에 담겼습니다!");
            closeModal();
        }

        function toggleMenu() {
            const menu = document.getElementById('category-menu');
            const overlay = document.getElementById('overlay');
            if(menu.style.display === 'block') {
                menu.style.display = 'none'; overlay.style.display = 'none';
            } else {
                showMenu();
                menu.style.display = 'block'; overlay.style.display = 'block';
            }
        }

        function showMenu() {
            const content = document.getElementById('menu-content');
            let html = `<div class="menu-item" style="font-weight:bold; color:var(--accent-color);" onclick="copyToClipboard()">📋 주문 정보 복사하기 (${orderList.length})</div>`;
            html += `<div class="menu-item" onclick="window.open('${products[0].link}')">🛍️ 스마트스토어 결제하러 가기</div>`;
            html += `<div class="menu-item" style="color:#999; font-size:11px;" onclick="if(confirm('비우시겠습니까?')){orderList=[];localStorage.clear();updateBadge();toggleMenu();}">장바구니 비우기</div>`;
            content.innerHTML = html;
        }

        function copyToClipboard() {
            if(orderList.length === 0) return alert("담긴 상품이 없습니다.");
            const text = orderList.join(", ");
            navigator.clipboard.writeText(text).then(() => {
                alert("복사완료! 스토어 '직접입력'란에 붙여넣으세요.\n\n내용: " + text);
            });
        }

        function openModal(code) {
            currentCode = code;
            selectedColor = ""; selectedSize = "";
            const p = products.find(item => item.code === code) || products[0];
            
            document.getElementById('modal-img').src = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;
            renderChips('color-chips', p.colors, 'color');
            renderChips('size-chips', p.sizes, 'size');

            const recList = document.getElementById('recommend-list');
            recList.innerHTML = p.rec.map(c => `<div class="rec-item" onclick="openModal('${c}')"><img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${c}.jpg"></div>`).join('');
            
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        const main = document.getElementById('product-list');
        products.forEach(p => {
            main.innerHTML += `<div class="product-card" onclick="openModal('${p.code}')"><img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${p.code}.jpg"><p style="text-align:center; font-weight:bold; margin-top:5px;">NO.${p.code}</p></div>`;
        });
        updateBadge();
    </script>
</body>
</html>
