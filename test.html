사장님, 디자인을 훨씬 세련되게 다듬어 보았습니다. 기존의 투박한 주황색 버튼 대신, 세련된 반투명 배경과 미니멀한 아이콘 느낌을 살리고, 메뉴가 나타날 때 부드러운 애니메이션이 들어가도록 수정했습니다.

특히 카테고리 창이 뜰 때 화면 전체를 살짝 흐리게(블러 처리) 만들어서, 쇼핑몰 앱 같은 고급스러운 느낌을 주었습니다.

✨ 고급형 플로팅 카테고리 디자인 적용 버전
HTML
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER CATALOG</title>
    <style>
        :root { --primary-color: #111; --accent-color: #555; --bg-light: #f8f8f8; }
        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background: var(--bg-light); -webkit-tap-highlight-color: transparent; }

        /* [메인 리스트 디자인] */
        .slide-container { display: flex; overflow-x: auto; gap: 20px; padding: 25px; scrollbar-width: none; }
        .slide-container::-webkit-scrollbar { display: none; }
        .product-card { flex: 0 0 160px; background: #fff; border-radius: 20px; padding: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); transition: transform 0.2s; }
        .product-card:active { transform: scale(0.95); }
        .product-card img { width: 100%; border-radius: 15px; }

        /* [플로팅 버튼 디자인 - 유리질 효과] */
        .fab-container { position: fixed; bottom: 160px; right: 20px; z-index: 999999; }
        .fab-main { 
            width: 60px; height: 60px; background: var(--primary-color); border-radius: 50%;
            color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab-main span { font-size: 10px; margin-top: 2px; font-weight: 300; }
        .fab-main::before { content: '≡'; font-size: 24px; line-height: 1; }

        /* [카테고리 메뉴 - 고급형 모달 스타일] */
        .category-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999998; 
        }
        .category-menu { 
            display: none; position: fixed; bottom: 235px; right: 20px; 
            background: #fff; border-radius: 24px; width: 220px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); overflow: hidden; z-index: 999999;
            transform-origin: bottom right; animation: menuShow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes menuShow { from { opacity: 0; transform: scale(0.5) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .menu-header { background: #fafafa; padding: 18px; font-size: 15px; font-weight: 700; text-align: left; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; }
        .menu-item { padding: 16px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 14px; color: #333; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .menu-item:active { background: #f5f5f5; }
        .menu-item span { color: #ccc; font-size: 12px; }

        /* [추천 바 디자인 개선] */
        .recommend-section { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 15px 0 40px; z-index: 40000; border-radius: 25px 25px 0 0; }
        .recommend-title { font-size: 14px; font-weight: 700; padding: 0 25px 15px; color: #111; letter-spacing: -0.5px; }
        .recommend-list { display: flex; overflow-x: scroll; padding: 0 20px; gap: 12px; -webkit-overflow-scrolling: auto !important; }
        .recommend-list::-webkit-scrollbar { display: none; }
        .rec-item { flex: 0 0 100px; text-align: center; }
        .rec-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; border: 1px solid #f0f0f0; }
        .rec-code { font-size: 10px; font-weight: 600; color: #999; margin-top: 6px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; overflow-y: auto; }
        #modal-img { display: block; width: 100%; max-width: 800px; margin: 0 auto; }
        .close-btn { margin: 40px auto 300px; width: 120px; padding: 15px; background: #eee; border-radius: 30px; text-align: center; font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

    <div class="slide-container" id="product-list"></div>

    <!-- 배경 블러 오버레이 -->
    <div class="category-overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- 플로팅 카테고리 UI -->
    <div class="fab-container">
        <div class="category-menu" id="category-menu">
            <div class="menu-header" id="menu-title">CATEGORY</div>
            <div id="menu-content"></div>
        </div>
        <div class="fab-main" id="fab-btn" onclick="toggleMenu()">
            <span>MENU</span>
        </div>
    </div>

    <div id="modal">
        <img id="modal-img" src="">
        <div class="recommend-section">
            <div class="recommend-title">함께 코디하면 예뻐요 ✨</div>
            <div class="recommend-list" id="recommend-list"></div>
        </div>
        <div class="close-btn" onclick="closeModal()">CLOSE</div>
    </div>

    <script>
        // 카테고리 데이터 (사장님 상품에 맞춰 수정)
        const categories = {
            "TOP": { "티셔츠": ["566", "565"], "셔츠/남방": ["563", "562"], "가디건": ["561"] },
            "BOTTOM": { "청바지": ["560", "559"], "반바지": ["558", "557"] },
            "ACC": { "모자": ["556"], "양말": ["555"] }
        };

        const rawData = [ 
            ["566", "그린", "3,5,7", ["565", "564", "563", "562", "561"]], 
            ["565", "민트", "3,5,7", ["566", "564", "563", "562", "561"]]
        ];

        function toggleMenu() {
            const menu = document.getElementById('category-menu');
            const overlay = document.getElementById('overlay');
            const btn = document.getElementById('fab-btn');
            
            if(menu.style.display === 'block') {
                menu.style.display = 'none';
                overlay.style.display = 'none';
                btn.style.transform = 'rotate(0deg)';
            } else {
                showMainCategories();
                menu.style.display = 'block';
                overlay.style.display = 'block';
                btn.style.transform = 'rotate(90deg)';
            }
        }

        function showMainCategories() {
            const content = document.getElementById('menu-content');
            document.getElementById('menu-title').innerText = "CATEGORY";
            let html = '';
            for(let main in categories) {
                html += `<div class="menu-item" onclick="showSubCategories('${main}')">${main} <span>❯</span></div>`;
            }
            content.innerHTML = html;
        }

        function showSubCategories(main) {
            const content = document.getElementById('menu-content');
            document.getElementById('menu-title').innerText = main;
            let html = `<div class="menu-item" style="color:#999; font-size:12px;" onclick="showMainCategories()">❮ BACK</div>`;
            for(let sub in categories[main]) {
                html += `<div class="menu-item" onclick="selectCategory('${main}', '${sub}')">${sub}</div>`;
            }
            content.innerHTML = html;
        }

        function selectCategory(main, sub) {
            const firstProduct = categories[main][sub][0];
            openModal(firstProduct);
            toggleMenu();
        }

        function openModal(code) {
            document.getElementById('modal-img').src = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;
            const recContainer = document.getElementById('recommend-list');
            let recHtml = '';
            rawData[0][3].forEach(recCode => {
                recHtml += `<div class="rec-item" onclick="openModal('${recCode}')"><img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${recCode}.jpg"><div class="rec-code">NO.${recCode}</div></div>`;
            });
            recContainer.innerHTML = recHtml;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        const mainList = document.getElementById('product-list');
        rawData.forEach(item => {
            mainList.innerHTML += `<div class="product-card" onclick="openModal('${item[0]}')"><img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${item[0]}.jpg"><p style="text-align:center; font-weight:bold; font-size:14px; margin-top:8px;">NO.${item[0]}</p></div>`;
        });
    </script>
</body>
</html>
