<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 4월 신상 카탈로그</title>
    <style>
        body { margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif; background: #fff; color: #222; -webkit-tap-highlight-color: transparent; }
        header { padding: 20px 15px; border-bottom: 1px solid #f0f0f0; text-align: center; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .section-title { padding: 25px 15px 12px; font-size: 19px; font-weight: bold; }
        .slide-container { display: flex; overflow-x: auto; padding: 0 15px 20px; gap: 14px; -webkit-overflow-scrolling: touch; }
        .slide-container::-webkit-scrollbar { display: none; }

        .product-card { flex: 0 0 170px; text-decoration: none; color: inherit; display: block; }
        .img-box { position: relative; width: 100%; aspect-ratio: 1/1.2; border-radius: 12px; overflow: hidden; background: #f8f8f8; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #fff; font-size: 11px; font-weight: bold; padding: 3px 7px; border-radius: 4px; z-index: 2; }

        .info-box { padding: 12px 2px 5px; }
        .color-chips { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
        .chip { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #eee; }
        
        .size-info { font-size: 13px; color: #d32f2f; font-weight: bold; letter-spacing: -0.5px; }
    </style>
</head>
<body>

    <header><div class="logo">KIDS RIVER</div></header>

    <div class="section-title">4월 14일 신상 라인업</div>
    <div class="slide-container" id="product-list"></div>

    <script>
        // 색상별 컬러 코드 정의 (사장님 요청 리스트 기준)
        const colorPalette = {
            "그린": "#4CAF50", "머스타드": "#FFC107", "베이지": "#F5F5DC", "아이": "#FFFFF0", "퍼플": "#A020F0",
            "민트": "#98FF98", "연보라": "#E6E6FA", "블루": "#2196F3", "카키": "#4B5320", "핑크": "#FFC0CB",
            "스카이청": "#87CEEB", "진청": "#00008B", "네이비": "#000080", "중청": "#5F9EA0", "블랙": "#000000",
            "스카이블루": "#87CEFA", "체리레드": "#D2042D", "크림아이": "#FFFDD0", "진그린": "#006400",
            "아이보리": "#FFFFF0", "인디핑크": "#B76E79", "인디연핑크": "#FADADD", "소라": "#82B5ED", "크림": "#FFFDD0",
            "스카이": "#87CEEB", "연베이지": "#F5F5DC"
        };

        // 보내주신 29개 상품 데이터
        const rawData = [
            ["566", "그린, 머스타드, 베이지, 아이, 퍼플", "3, 5, 7, 9, 11, 13"],
            ["565", "민트, 연보라", "3, 5, 7, 9, 11, 13"],
            ["564", "베이지, 블루, 아이, 카키, 핑크", "3, 5, 7, 9, 11, 13"],
            ["563", "스카이청, 진청", "3, 5, 7, 9, 11, 13"],
            ["562", "네이비, 카키", "3, 5, 7, 9, 11, 13"],
            ["561", "중청", "3, 5, 7, 9, 11, 13"],
            ["560", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"],
            ["559", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"],
            ["558", "크림아이, 진그린", "3, 5, 7, 9, 11, 13"],
            ["557", "베이지, 카키", "3, 5, 7, 9, 11, 13"],
            ["556", "베이지, 카키", "3, 5, 7, 9, 11, 13"],
            ["555", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9, 11, 13"],
            ["554", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9"],
            ["553", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9"],
            ["552", "아이보리, 인디연핑크", "3, 5, 7, 9, 11, 13"],
            ["551", "민트, 블랙, 스카이블루, 연베이지, 퍼플", "3, 5, 7, 9, 11"],
            ["550", "핑크, 소라", "FREE"],
            ["549", "핑크, 소라", "S원사이즈"],
            ["548", "핑크, 소라", "S, M"],
            ["547", "크림", "FREE"],
            ["546", "크림", "FREE"],
            ["545", "크림", "S원사이즈"],
            ["544", "크림", "S, M"],
            ["543", "블랙", "FREE"],
            ["542", "블랙", "FREE"],
            ["541", "블랙", "FREE"],
            ["540", "블랙", "S원사이즈"],
            ["539", "블랙", "S, M"],
            ["538", "스카이", "FREE"]
        ];

        function render() {
            const container = document.getElementById('product-list');
            let html = '';

            rawData.forEach((item, index) => {
                const code = item[0];
                const colors = item[1].split(', ').map(c => c.trim());
                const size = item[2];
                
                const imgUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${code}.jpg`;
                const pageUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;

                // 컬러칩 생성
                let chips = '<div class="color-chips">';
                colors.forEach(c => {
                    const hex = colorPalette[c] || "#ddd";
                    chips += `<div class="chip" style="background-color: ${hex}" title="${c}"></div>`;
                });
                chips += '</div>';

                html += `
                    <a href="${pageUrl}" class="product-card">
                        <div class="img-box">
                            <div class="badge">No.${index + 1}</div>
                            <img src="${imgUrl}" loading="lazy">
                        </div>
                        <div class="info-box">
                            ${chips}
                            <div class="size-info">SIZE: ${size}</div>
                        </div>
                    </a>
                `;
            });
            container.innerHTML = html;
        }

        render();
    </script>
</body>
</html>
