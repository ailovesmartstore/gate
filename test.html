<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER CATALOG</title>
    <style>
        :root { --primary-color: #111; --accent-color: #ff5722; --bg-light: #f8f8f8; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--bg-light); -webkit-tap-highlight-color: transparent; }

        /* 메인 리스트 */
        .slide-container { display: flex; overflow-x: auto; gap: 15px; padding: 20px; scrollbar-width: none; }
        .product-card { flex: 0 0 150px; background: #fff; border-radius: 15px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .product-card img { width: 100%; border-radius: 10px; }

        /* 플로팅 버튼 */
        .fab-container { position: fixed; bottom: 30px; right: 20px; z-index: 999999; }
        .fab-main { width: 60px; height: 60px; background: var(--primary-color); border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; font-size: 12px; font-weight: bold; position: relative; }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--accent-color); color: #fff; font-size: 11px; padding: 3px 7px; border-radius: 10px; border: 2px solid #fff; }

        /* 메뉴창 */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 999998; }
        .menu-window { display: none; position: fixed; bottom: 100px; right: 20px; background: #fff; border-radius: 20px; width: 260px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 999999; overflow: hidden; }
        .menu-item { padding: 15px; border-bottom: 1px solid #f2f2f2; font-size: 14px; text-align: center; cursor: pointer; }

        /* 상세 모달 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; overflow-y: auto; }
        #modal-img { width: 100%; max-width: 800px; display: block; margin: 0 auto; }

        /* 옵션 영역 */
        .opt-box { padding: 20px; background: #fff; }
        .opt-title { font-size: 12px; color: #888; font-weight: bold; margin: 15px 0 8px; }
        .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .chip.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .add-btn { width: 100%; padding: 16px; background: var(--primary-color); color: #fff; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; }

        /* 하단 고정 추천바 (디자인 수정) */
        .rec-section { background: #fafafa; padding: 20px 0 40px; border-top: 1px solid #eee; }
        .rec-title { font-size: 14px; font-weight: bold; padding: 0 20px 15px; }
        .rec-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 0 20px; scrollbar-width: none; }
        .rec-item { flex: 0 0 100px; cursor: pointer; }
        .rec-item img { width: 100%; border-radius: 12px; border: 1px solid #eee; }
        
        .close-footer { text-align: center; padding: 30px 0 100px; background: #fafafa; }
        .close-btn { display: inline-block; padding: 12px 40px; background: #eee; border-radius: 25px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="slide-container" id="main-list"></div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="fab-container">
        <div class="menu-window" id="menu-window">
            <div id="menu-content"></div>
        </div>
        <div class="fab-main" onclick="toggleMenu()">
            <div class="badge" id="cart-count">0</div>
            MENU
        </div>
    </div>

    <div id="modal">
        <img id="modal-img" src="">
        
        <div class="opt-box">
            <div class="opt-title">색상 선택</div>
            <div class="chip-grid" id="color-area"></div>
            <div class="opt-title">사이즈 선택</div>
            <div class="chip-grid" id="size-area"></div>
            <button class="add-btn" onclick="pushToCart()">장바구니 담기</button>
        </div>

        <div class="rec-section">
            <div class="rec-title">추천 코디 상품 ✨</div>
            <div class="rec-scroll" id="rec-area"></div>
        </div>

        <div class="close-footer">
            <div class="close-btn" onclick="closeModal()">목록으로 돌아가기</div>
        </div>
    </div>

    <script>
        let curItem = null, selColor = "", selSize = "";
        let myCart = JSON.parse(localStorage.getItem('kids_river_cart')) || [];

        const productData = [
            { id: "566", colors: ["그린", "크림"], sizes: ["5호", "7호", "9호"], rec: ["565", "564"], link: "https://smartstore.naver.com/kidsriver/products/1" },
            { id: "565", colors: ["민트", "노랑"], sizes: ["3호", "5호", "7호"], rec: ["566", "564"], link: "https://smartstore.naver.com/kidsriver/products/1" }
        ];

        function updateUI() { document.getElementById('cart-count').innerText = myCart.length; }

        function toggleMenu() {
            const m = document.getElementById('menu-window'), o = document.getElementById('overlay');
            if(m.style.display === 'block') { m.style.display = 'none'; o.style.display = 'none'; }
            else { renderMenu(); m.style.display = 'block'; o.style.display = 'block'; }
        }

        function renderMenu() {
            const cont = document.getElementById('menu-content');
            let h = `<div class="menu-item" style="color:var(--accent-color); font-weight:bold;" onclick="copyOrder()">📋 주문 정보 복사 (${myCart.length}벌)</div>`;
            h += `<div class="menu-item" onclick="window.open('${productData[0].link}')">🛍️ 스마트스토어 결제</div>`;
            h += `<div class="menu-item" style="color:#bbb" onclick="clearCart()">비우기</div>`;
            cont.innerHTML = h;
        }

        function copyOrder() {
            if(myCart.length === 0) return alert("장바구니가 비어있습니다.");
            const text = `[총 ${myCart.length}벌 결제 필요] ${myCart.join(', ')}`;
            navigator.clipboard.writeText(text).then(() => { alert("복사완료!\n" + text); toggleMenu(); });
        }

        function clearCart() { if(confirm('비우시겠습니까?')) { myCart=[]; localStorage.clear(); updateUI(); toggleMenu(); } }

        function openModal(id) {
            const p = productData.find(x => x.id === id) || productData[0];
            curItem = p; selColor = ""; selSize = "";
            document.getElementById('modal-img').src = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${id}.jpg`;
            
            const makeChips = (area, list, type) => {
                document.getElementById(area).innerHTML = list.map(v => `<div class="chip" onclick="clickChip(this, '${v}', '${type}')">${v}</div>`).join('');
            };
            makeChips('color-area', p.colors, 'c');
            makeChips('size-area', p.sizes, 's');

            document.getElementById('rec-area').innerHTML = p.rec.map(r => `<div class="rec-item" onclick="openModal('${r}')"><img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${r}.jpg"></div>`).join('');
            document.getElementById('modal').style.display = 'block';
            document.getElementById('modal').scrollTo(0,0);
            document.body.style.overflow = 'hidden';
        }

        function clickChip(el, val, type) {
            el.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            if(type === 'c') selColor = val; else selSize = val;
        }

        function pushToCart() {
            if(!selColor || !selSize) return alert("옵션을 선택하세요!");
            myCart.push(`${curItem.id}(${selColor}/${selSize})`);
            localStorage.setItem('kids_river_cart', JSON.stringify(myCart));
            updateUI(); alert("담겼습니다!"); closeModal();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        productData.forEach(p => {
            document.getElementById('main-list').innerHTML += `<div class="product-card" onclick="openModal('${p.id}')"><img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${p.id}.jpg"><p style="text-align:center; font-weight:bold; margin-top:8px;">NO.${p.id}</p></div>`;
        });
        updateUI();
    </script>
</body>
</html>
