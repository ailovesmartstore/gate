<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 스마트 카탈로그</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; 
            background: #f4f4f4; color: #333; letter-spacing: -0.04em;
        }
        header { width: 100%; padding: 30px 0; text-align: center; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 3px; color: #111; }
        .section-title { width: 100%; padding: 0 0 20px; font-size: 13px; font-weight: 600; text-align: center; color: #999; letter-spacing: 0.05em; }

        .slide-container { 
            display: flex; overflow-x: auto; width: 100%; padding: 0 0 40px; gap: 20px; 
            -webkit-overflow-scrolling: touch;
        }
        .slide-container::-webkit-scrollbar { display: none; }
        .slide-container::before, .slide-container::after { content: ''; flex: 0 0 20px; }

        .product-card { 
            flex: 0 0 240px; background: #fff; border-radius: 18px; 
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            cursor: pointer;
        }
        .img-box { position: relative; width: 100%; aspect-ratio: 1/1.2; overflow: hidden; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9); color: #222; font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; }

        .info-box { padding: 18px 15px; }

        /* [핵심] 가독성을 높인 캡슐형 컬러 칩 */
        .color-scroll-wrapper {
            display: flex; gap: 6px; overflow-x: auto; 
            padding-bottom: 12px; margin-bottom: 12px;
            scrollbar-width: none; /* 파이어폭스 */
        }
        .color-scroll-wrapper::-webkit-scrollbar { display: none; } /* 크롬, 사파리 */

        .color-capsule {
            flex: 0 0 auto; padding: 5px 12px; border-radius: 15px;
            font-size: 11px; font-weight: 600; border: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center;
        }

        .size-info-row {
            display: flex; align-items: center; justify-content: space-between;
            border-top: 1px solid #f0f0f0; padding-top: 12px;
        }
        .size-label { font-size: 10px; font-weight: 800; color: #ccc; }
        .size-text { font-size: 12px; font-weight: 700; color: #444; }

        /* 상세페이지 팝업 및 뒤로가기 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; }
        .floating-back-btn {
            position: fixed; top: 50%; left: 15px; transform: translateY(-50%);
            width: 48px; height: 48px; background: #fff; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer; z-index: 9999; border: 1px solid #eee;
        }
        .floating-back-btn::after { content: ''; width: 10px; height: 10px; border-top: 3.5px solid #222; border-left: 3.5px solid #222; transform: rotate(-45deg); margin-left: 4px; }
        #modal img { display: block; width: 100%; max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>

    <header><div class="logo">KIDS RIVER</div></header>
    <div class="section-title">2026 SPRING NEW TREND</div>
    <div class="slide-container" id="product-list"></div>

    <div id="modal">
        <div class="floating-back-btn" onclick="history.back()"></div>
        <img id="modal-img" src="">
    </div>

    <script>
        const colorPalette = { "그린": "#4CAF50", "머스타드": "#FFC107", "베이지": "#F5F5DC", "아이": "#FFFFF0", "퍼플": "#A020F0", "민트": "#98FF98", "연보라": "#E6E6FA", "블루": "#2196F3", "카키": "#4B5320", "핑크": "#FFC0CB", "스카이청": "#87CEEB", "진청": "#00008B", "네이비": "#000080", "중청": "#5F9EA0", "블랙": "#000000", "스카이블루": "#87CEFA", "체리레드": "#D2042D", "크림아이": "#FFFDD0", "진그린": "#006400", "아이보리": "#FFFFF0", "인디핑크": "#B76E79", "인디연핑크": "#FADADD", "소라": "#82B5ED", "크림": "#FFFDD0", "스카이": "#87CEEB", "연베이지": "#F5F5DC" };
        
        // 배경색에 따라 글자색(검정/흰색) 결정 함수
        function getContrastYIQ(hexcolor){
            hexcolor = hexcolor.replace("#", "");
            var r = parseInt(hexcolor.substr(0,2),16);
            var g = parseInt(hexcolor.substr(2,2),16);
            var b = parseInt(hexcolor.substr(4,2),16);
            var yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        const rawData = [ ["566", "그린, 머스타드, 베이지, 아이, 퍼플", "3, 5, 7, 9, 11, 13"], ["565", "민트, 연보라", "3, 5, 7, 9, 11, 13"], ["564", "베이지, 블루, 아이, 카키, 핑크", "3, 5, 7, 9, 11, 13"], ["563", "스카이청, 진청", "3, 5, 7, 9, 11, 13"], ["562", "네이비, 카키", "3, 5, 7, 9, 11, 13"] ];

        function openModal(url) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-img').src = url;
            history.pushState({modalOpen: true}, '');
            modal.style.display = 'block';
            modal.scrollTo(0, 0); 
            document.body.style.overflow = 'hidden';
        }

        window.onpopstate = function(event) {
            const modal = document.getElementById('modal');
            if (modal.style.display === 'block') {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        function render() {
            const container = document.getElementById('product-list');
            let html = '';
            rawData.forEach((item) => {
                const code = item[0];
                const colorNames = item[1].split(', ').map(c => c.trim());
                const sizeStr = item[2].split(', ').map(s => isNaN(s) ? s : s + '호').join(', ');
                const imgUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${code}.jpg`;
                const pageUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;
                
                let colorChipsHtml = '<div class="color-scroll-wrapper">';
                colorNames.forEach(c => {
                    const hex = colorPalette[c] || "#ddd";
                    const textColor = getContrastYIQ(hex);
                    colorChipsHtml += `<div class="color-capsule" style="background-color: ${hex}; color: ${textColor}">${c}</div>`;
                });
                colorChipsHtml += '</div>';

                html += `
                    <div class="product-card" onclick="openModal('${pageUrl}')">
                        <div class="img-box">
                            <img src="${imgUrl}" loading="lazy">
                            <div class="badge">NO.${code}</div>
                        </div>
                        <div class="info-box">
                            ${colorChipsHtml}
                            <div class="size-info-row">
                                <span class="size-label">SIZE GUIDE</span>
                                <span class="size-text">${sizeStr}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        render();
    </script>
</body>
</html>
