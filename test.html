<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER CATALOG</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f8f8f8; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .slide-container { display: flex; overflow-x: auto; gap: 15px; padding: 20px; -webkit-overflow-scrolling: touch; }
        .product-card { flex: 0 0 180px; background: #fff; border-radius: 15px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .product-card img { width: 100%; border-radius: 10px; pointer-events: none; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; overflow-y: auto; }
        #modal-img { display: block; width: 100%; max-width: 800px; margin: 0 auto; }

        /* [플로팅 버튼 최적화] */
        .fab-container { 
            position: fixed; 
            bottom: 160px; /* 하단 바보다 위로 올렸습니다 */
            right: 20px; 
            z-index: 999999; /* 모든 요소보다 가장 위에 오도록 설정 */
        }
        .fab-main { 
            width: 55px; 
            height: 55px; 
            background: #ff5722; /* 검은색 대신 눈에 띄는 오렌지색으로 변경 */
            border-radius: 50%; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4); 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 13px;
            border: 2px solid #fff;
        }
        
        /* 카테고리 메뉴 */
        .category-menu { 
            display: none; 
            position: absolute; 
            bottom: 65px; 
            right: 0; 
            background: #fff; 
            border-radius: 15px; 
            width: 180px; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.3); 
            overflow: hidden; 
        }
        .menu-header { background: #f4f4f4; padding: 12px; font-size: 13px; font-weight: bold; text-align: center; border-bottom: 1px solid #eee; }
        .menu-item { padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; }

        .recommend-section { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 15px 0 35px; z-index: 40000; }
        .recommend-list { display: flex; overflow-x: scroll; padding: 0 20px; -webkit-overflow-scrolling: auto !important; }
        .recommend-list::-webkit-scrollbar { display: none; }
        .rec-item { flex: 0 0 95px; margin-right: 12px; text-align: center; }
        .rec-item img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="slide-container" id="product-list"></div>

    <!-- 플로팅 버튼 (이 부분이 안보였던 겁니다) -->
    <div class="fab-container" id="fab-box">
        <div class="category-menu" id="category-menu">
            <div class="menu-header" id="menu-title">카테고리</div>
            <div id="menu-content"></div>
        </div>
        <div class="fab-main" onclick="toggleMenu()">카테고리</div>
    </div>

    <div id="modal">
        <img id="modal-img" src="">
        <div class="recommend-section">
            <div class="recommend-list" id="recommend-list"></div>
        </div>
        <div style="padding: 50px 20px 250px; text-align: center;">
            <div style="padding: 15px 40px; background: #111; color: #fff; border-radius: 30px; display:inline-block;" onclick="closeModal()">목록으로</div>
        </div>
    </div>

    <script>
        const categories = {
            "상의": { "티셔츠": ["566", "565"], "맨투맨": ["563", "562"] },
            "하의": { "데님": ["560", "559"], "면바지": ["557", "556"] }
        };

        const rawData = [ 
            ["566", "그린", "3,5,7", ["565", "564", "563", "562", "561"]], 
            ["565", "민트", "3,5,7", ["566", "564", "563", "562", "561"]]
        ];

        function toggleMenu() {
            const menu = document.getElementById('category-menu');
            if(menu.style.display === 'block') {
                menu.style.display = 'none';
            } else {
                showMainCategories();
                menu.style.display = 'block';
            }
        }

        function showMainCategories() {
            const content = document.getElementById('menu-content');
            document.getElementById('menu-title').innerText = "카테고리 선택";
            let html = '';
            for(let main in categories) {
                html += `<div class="menu-item" onclick="showSubCategories('${main}')">${main} <span>></span></div>`;
            }
            content.innerHTML = html;
        }

        function showSubCategories(main) {
            const content = document.getElementById('menu-content');
            document.getElementById('menu-title').innerText = main;
            let html = `<div class="menu-item" style="color:#ff5722; font-size:12px;" onclick="showMainCategories()">← 뒤로가기</div>`;
            for(let sub in categories[main]) {
                html += `<div class="menu-item" onclick="selectCategory('${main}', '${sub}')">${sub}</div>`;
            }
            content.innerHTML = html;
        }

        function selectCategory(main, sub) {
            const firstProduct = categories[main][sub][0];
            openModal(firstProduct);
            toggleMenu();
        }

        function openModal(code) {
            document.getElementById('modal-img').src = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;
            const recContainer = document.getElementById('recommend-list');
            let recHtml = '';
            rawData[0][3].forEach(recCode => {
                recHtml += `<div class="rec-item" onclick="openModal('${recCode}')"><img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${recCode}.jpg"></div>`;
            });
            recContainer.innerHTML = recHtml;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            // 상세페이지 열릴 때 버튼이 너무 가리지 않게 살짝 투명하게 하거나 위치 조정 가능
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        const mainList = document.getElementById('product-list');
        rawData.forEach(item => {
            mainList.innerHTML += `<div class="product-card" onclick="openModal('${item[0]}')"><img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${item[0]}.jpg"></div>`;
        });
    </script>
</body>
</html>
