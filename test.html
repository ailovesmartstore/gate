<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 프리미엄 카탈로그</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* 1. 기본 여백 제거 및 가운데 정렬 */
        body { 
            margin: 0; 
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif; 
            background: #fff; 
            color: #333; 
            -webkit-tap-highlight-color: transparent; 
            letter-spacing: -0.04em;
            display: flex;
            flex-direction: column;
            align-items: center; /* 가로축 중앙 정렬 */
        }
        
        header { width: 100%; padding: 30px 0; text-align: center; }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; color: #1a1a1a; }
        .section-title { width: 100%; padding: 10px 0 20px; font-size: 18px; font-weight: 700; text-align: center; color: #444; }

        /* 2. 슬라이드 컨테이너: 모바일에서 꽉 차게 보이도록 설정 */
        .slide-container { 
            display: flex; 
            overflow-x: auto; 
            width: 100%; /* 화면 너비 전체 사용 */
            padding: 0 0 50px; /* 양옆 패딩 제거하여 끝까지 닿게 함 */
            gap: 15px; 
            -webkit-overflow-scrolling: touch; 
        }
        .slide-container::-webkit-scrollbar { display: none; }

        /* 첫 번째와 마지막 아이템에 여백을 주어 중앙 정렬 느낌 유지 */
        .slide-container::before,
        .slide-container::after {
            content: '';
            flex: 0 0 20px;
        }

        .product-card { 
            flex: 0 0 200px; /* 상품 카드 크기 소폭 확대 */
            text-decoration: none; 
            color: inherit; 
            display: block;
            text-align: center;
        }

        .img-box { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1/1.2; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #f1f1f1; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            margin-bottom: 18px;
        }
        
        /* 3. 상세페이지(상세이미지) 최적화: 여백 없이 꽉 참 */
        .img-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* 이미지가 박스에 꽉 차게 */
            display: block;
        }
        
        .badge { 
            position: absolute; 
            top: 12px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(255,255,255,0.95); 
            color: #222; 
            font-size: 10px; 
            font-weight: 800; 
            padding: 5px 12px; 
            border-radius: 20px; 
        }

        .color-list { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 15px; }
        .color-item { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .chip { width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.08); }
        .color-name { font-size: 13px; color: #777; font-weight: 500; }
        
        .size-container { margin-top: 10px; }
        .size-label { display: block; font-size: 9px; color: #aaa; margin-bottom: 5px; font-weight: 700; }
        .size-info { 
            font-size: 11px; 
            color: #444; 
            font-weight: 700; 
            background: #fdfdfd; 
            border: 1px solid #eee;
            padding: 7px 14px; 
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header><div class="logo">KIDS RIVER</div></header>

    <div class="section-title">TODAY'S NEW ARRIVALS</div>
    <div class="slide-container" id="product-list"></div>

    <script>
        const colorPalette = {
            "그린": "#4CAF50", "머스타드": "#FFC107", "베이지": "#F5F5DC", "아이": "#FFFFF0", "퍼플": "#A020F0",
            "민트": "#98FF98", "연보라": "#E6E6FA", "블루": "#2196F3", "카키": "#4B5320", "핑크": "#FFC0CB",
            "스카이청": "#87CEEB", "진청": "#00008B", "네이비": "#000080", "중청": "#5F9EA0", "블랙": "#000000",
            "스카이블루": "#87CEFA", "체리레드": "#D2042D", "크림아이": "#FFFDD0", "진그린": "#006400",
            "아이보리": "#FFFFF0", "인디핑크": "#B76E79", "인디연핑크": "#FADADD", "소라": "#82B5ED", "크림": "#FFFDD0",
            "스카이": "#87CEEB", "연베이지": "#F5F5DC"
        };

        const rawData = [
            ["566", "그린, 머스타드, 베이지, 아이, 퍼플", "3, 5, 7, 9, 11, 13"],
            ["565", "민트, 연보라", "3, 5, 7, 9, 11, 13"],
            ["564", "베이지, 블루, 아이, 카키, 핑크", "3, 5, 7, 9, 11, 13"],
            ["563", "스카이청, 진청", "3, 5, 7, 9, 11, 13"],
            ["562", "네이비, 카키", "3, 5, 7, 9, 11, 13"],
            ["561", "중청", "3, 5, 7, 9, 11, 13"],
            ["560", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"],
            ["559", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"],
            ["558", "크림아이, 진그린", "3, 5, 7, 9, 11, 13"],
            ["557", "베이지, 카키", "3, 5, 7, 9, 11, 13"],
            ["556", "베이지, 카키", "3, 5, 7, 9, 11, 13"],
            ["555", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9, 11, 13"],
            ["554", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9"],
            ["553", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9"],
            ["552", "아이보리, 인디연핑크", "3, 5, 7, 9, 11, 13"],
            ["551", "민트, 블랙, 스카이블루, 연베이지, 퍼플", "3, 5, 7, 9, 11"],
            ["550", "핑크, 소라", "FREE"],
            ["549", "핑크, 소라", "S원사이즈"],
            ["548", "핑크, 소라", "S, M"],
            ["547", "크림", "FREE"],
            ["546", "크림", "FREE"],
            ["545", "크림", "S원사이즈"],
            ["544", "크림", "S, M"],
            ["543", "블랙", "FREE"],
            ["542", "블랙", "FREE"],
            ["541", "블랙", "FREE"],
            ["540", "블랙", "S원사이즈"],
            ["539", "블랙", "S, M"],
            ["538", "스카이", "FREE"]
        ];

        function render() {
            const container = document.getElementById('product-list');
            let html = '';

            rawData.forEach((item) => {
                const code = item[0];
                const colorNames = item[1].split(', ').map(c => c.trim());
                const sizeStr = item[2].split(', ').map(s => isNaN(s) ? s : s + '호').join(', ');
                
                const imgUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${code}.jpg`;
                const pageUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;

                let colorListHtml = '<div class="color-list">';
                colorNames.forEach(c => {
                    const hex = colorPalette[c] || "#ddd";
                    colorListHtml += `<div class="color-item"><div class="chip" style="background-color: ${hex}"></div><span class="color-name">${c}</span></div>`;
                });
                colorListHtml += '</div>';

                html += `
                    <a href="${pageUrl}" class="product-card">
                        <div class="img-box">
                            <div class="badge">NO.${code}</div>
                            <img src="${imgUrl}" loading="lazy">
                        </div>
                        <div class="info-box">
                            ${colorListHtml}
                            <div class="size-container">
                                <span class="size-label">SIZE GUIDE</span>
                                <div class="size-info">${sizeStr}</div>
                            </div>
                        </div>
                    </a>
                `;
            });
            container.innerHTML = html;
        }
        render();
    </script>
</body>
</html>
