<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 스마트 카탈로그</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; 
            background: #fafafa; color: #333; letter-spacing: -0.04em;
        }
        header { width: 100%; padding: 40px 0 20px; text-align: center; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; color: #222; }
        .section-title { width: 100%; padding: 0 0 30px; font-size: 14px; font-weight: 500; text-align: center; color: #999; letter-spacing: 0.1em; }

        .slide-container { 
            display: flex; overflow-x: auto; width: 100%; padding: 0 0 60px; gap: 24px; 
            -webkit-overflow-scrolling: touch;
        }
        .slide-container::-webkit-scrollbar { display: none; }
        .slide-container::before, .slide-container::after { content: ''; flex: 0 0 25px; }

        /* [수정] 카드 전체를 더 깔끔하게 */
        .product-card { 
            flex: 0 0 240px; background: #fff; border-radius: 20px; 
            padding-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            cursor: pointer; transition: transform 0.3s ease;
        }
        .img-box { position: relative; width: 100%; aspect-ratio: 1/1.2; border-radius: 20px 20px 0 0; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 10px; }

        .info-box { padding: 20px 15px 0; text-align: center; }

        /* [핵심] 가로형 컬러 칩 레이아웃 */
        .color-row { 
            display: flex; justify-content: center; gap: 8px; 
            margin-bottom: 18px; flex-wrap: wrap; 
            height: 24px; align-items: center;
        }
        .color-dot { 
            width: 14px; height: 14px; border-radius: 50%; 
            border: 1px solid rgba(0,0,0,0.05); position: relative;
        }
        /* 칩 위에 마우스를 올리거나 하면 보일 수 있는 툴팁 느낌의 이름 (선택사항) */
        .color-dot:hover::after {
            content: attr(data-name); position: absolute; top: -20px; left: 50%; 
            transform: translateX(-50%); font-size: 9px; background: #333; 
            color: #fff; padding: 2px 6px; border-radius: 4px; white-space: nowrap;
        }

        .size-label { font-size: 10px; font-weight: 700; color: #ddd; letter-spacing: 0.1em; margin-bottom: 8px; display: block; }
        .size-info { 
            font-size: 12px; color: #555; font-weight: 600; 
            background: #f8f8f8; padding: 8px 16px; border-radius: 12px; 
            display: inline-block;
        }

        /* 상세페이지 팝업 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1000; overflow-y: auto; }
        .floating-back-btn {
            position: fixed; top: 50%; left: 15px; transform: translateY(-50%);
            width: 48px; height: 48px; background: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer; z-index: 9999;
        }
        .floating-back-btn::after { content: ''; width: 10px; height: 10px; border-top: 2.5px solid #222; border-left: 2.5px solid #222; transform: rotate(-45deg); margin-left: 5px; }
        
        #modal img { display: block; width: 100%; max-width: 800px; margin: 0 auto; }
        .modal-footer { padding: 50px 20px; text-align: center; }
        .close-footer-btn { padding: 18px 45px; background: #222; color: #fff; border-radius: 35px; font-weight: 600; font-size: 14px; display: inline-block; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header><div class="logo">KIDS RIVER</div></header>
    <div class="section-title">2026 SPRING COLLECTION</div>
    <div class="slide-container" id="product-list"></div>

    <div id="modal">
        <div class="floating-back-btn" onclick="history.back()"></div>
        <img id="modal-img" src="">
        <div class="modal-footer">
            <div class="close-footer-btn" onclick="history.back()">BACK TO LIST</div>
        </div>
    </div>

    <script>
        const colorPalette = { "그린": "#4CAF50", "머스타드": "#FFC107", "베이지": "#F5F5DC", "아이": "#FFFFF0", "퍼플": "#A020F0", "민트": "#98FF98", "연보라": "#E6E6FA", "블루": "#2196F3", "카키": "#4B5320", "핑크": "#FFC0CB", "스카이청": "#87CEEB", "진청": "#00008B", "네이비": "#000080", "중청": "#5F9EA0", "블랙": "#000000", "스카이블루": "#87CEFA", "체리레드": "#D2042D", "크림아이": "#FFFDD0", "진그린": "#006400", "아이보리": "#FFFFF0", "인디핑크": "#B76E79", "인디연핑크": "#FADADD", "소라": "#82B5ED", "크림": "#FFFDD0", "스카이": "#87CEEB", "연베이지": "#F5F5DC" };
        const rawData = [ ["566", "그린, 머스타드, 베이지, 아이, 퍼플", "3, 5, 7, 9, 11, 13"], ["565", "민트, 연보라", "3, 5, 7, 9, 11, 13"], ["564", "베이지, 블루, 아이, 카키, 핑크", "3, 5, 7, 9, 11, 13"], ["563", "스카이청, 진청", "3, 5, 7, 9, 11, 13"], ["562", "네이비, 카키", "3, 5, 7, 9, 11, 13"], ["561", "중청", "3, 5, 7, 9, 11, 13"], ["560", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"], ["559", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"], ["558", "크림아이, 진그린", "3, 5, 7, 9, 11, 13"], ["557", "베이지, 카키", "3, 5, 7, 9, 11, 13"] ];

        function openModal(url) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-img').src = url;
            history.pushState({modalOpen: true}, '');
            modal.style.display = 'block';
            modal.scrollTo(0, 0); 
            document.body.style.overflow = 'hidden';
        }

        window.onpopstate = function(event) {
            const modal = document.getElementById('modal');
            if (modal.style.display === 'block') {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        };

        function render() {
            const container = document.getElementById('product-list');
            let html = '';
            rawData.forEach((item) => {
                const code = item[0];
                const colorNames = item[1].split(', ').map(c => c.trim());
                const sizeStr = item[2].split(', ').map(s => isNaN(s) ? s : s + '호').join(', ');
                const imgUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${code}.jpg`;
                const pageUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;
                
                // 가로 칩 생성
                let colorChipsHtml = '<div class="color-row">';
                colorNames.forEach(c => {
                    const hex = colorPalette[c] || "#ddd";
                    colorChipsHtml += `<div class="color-dot" style="background-color: ${hex}" data-name="${c}"></div>`;
                });
                colorChipsHtml += '</div>';

                html += `
                    <div class="product-card" onclick="openModal('${pageUrl}')">
                        <div class="img-box">
                            <img src="${imgUrl}" loading="lazy">
                            <div class="badge">CODE ${code}</div>
                        </div>
                        <div class="info-box">
                            ${colorChipsHtml}
                            <span class="size-label">SIZE</span>
                            <div class="size-info">${sizeStr}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        render();
    </script>
</body>
</html>
