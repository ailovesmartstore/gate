<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 4월 신상 카탈로그</title>
    
    <!-- 예쁜 글씨체를 위해 Google Fonts를 불러옵니다 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        /* 전체 글씨체 적용 */
        body { 
            margin: 0; 
            font-family: 'Noto Sans KR', sans-serif; 
            background: #fff; 
            color: #222; 
            -webkit-tap-highlight-color: transparent; 
            letter-spacing: -0.5px; /* 글자 간격을 약간 좁혀서 더 세련되게 만듦 */
        }
        
        header { 
            padding: 25px 15px; 
            border-bottom: 1px solid #f2f2f2; 
            text-align: center; 
        }
        
        .logo { 
            font-size: 26px; 
            font-weight: 900; 
            letter-spacing: -1.5px; 
            color: #000;
        }

        .section-title { 
            padding: 30px 15px 15px; 
            font-size: 20px; 
            font-weight: 700; 
            color: #111;
        }

        .slide-container { 
            display: flex; 
            overflow-x: auto; 
            padding: 0 15px 30px; 
            gap: 18px; 
            -webkit-overflow-scrolling: touch; 
        }
        .slide-container::-webkit-scrollbar { display: none; }

        .product-card { 
            flex: 0 0 180px; 
            text-decoration: none; 
            color: inherit; 
            display: block; 
        }

        .img-box { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1/1.2; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #f8f8f8; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.06); 
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .badge { 
            position: absolute; 
            top: 12px; 
            left: 12px; 
            background: rgba(0,0,0,0.7); 
            color: #fff; 
            font-size: 10px; 
            font-weight: 500; 
            padding: 4px 8px; 
            border-radius: 20px; 
            z-index: 2; 
        }

        .info-box { padding: 15px 5px; }
        
        /* 컬러 리스트 가독성 개선 */
        .color-list { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            margin-bottom: 12px; 
        }
        .color-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .chip { 
            width: 13px; 
            height: 13px; 
            border-radius: 50%; 
            border: 1px solid rgba(0,0,0,0.05); 
            flex-shrink: 0; 
        }
        .color-name { 
            font-size: 13px; 
            color: #666; 
            font-weight: 400; 
        }
        
        .size-info { 
            font-size: 12px; 
            color: #e63946; 
            font-weight: 700; 
            background: #fff0f0; 
            padding: 5px 10px; 
            border-radius: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <header><div class="logo">KIDS RIVER</div></header>

    <div class="section-title">4월 14일 신상 라인업</div>
    <div class="slide-container" id="product-list"></div>

    <script>
        // 색상 코드 정의
        const colorPalette = {
            "그린": "#4CAF50", "머스타드": "#FFC107", "베이지": "#F5F5DC", "아이": "#FFFFF0", "퍼플": "#A020F0",
            "민트": "#98FF98", "연보라": "#E6E6FA", "블루": "#2196F3", "카키": "#4B5320", "핑크": "#FFC0CB",
            "스카이청": "#87CEEB", "진청": "#00008B", "네이비": "#000080", "중청": "#5F9EA0", "블랙": "#000000",
            "스카이블루": "#87CEFA", "체리레드": "#D2042D", "크림아이": "#FFFDD0", "진그린": "#006400",
            "아이보리": "#FFFFF0", "인디핑크": "#B76E79", "인디연핑크": "#FADADD", "소라": "#82B5ED", "크림": "#FFFDD0",
            "스카이": "#87CEEB", "연베이지": "#F5F5DC"
        };

        const rawData = [
            ["566", "그린, 머스타드, 베이지, 아이, 퍼플", "3, 5, 7, 9, 11, 13"],
            ["565", "민트, 연보라", "3, 5, 7, 9, 11, 13"],
            ["564", "베이지, 블루, 아이, 카키, 핑크", "3, 5, 7, 9, 11, 13"],
            ["563", "스카이청, 진청", "3, 5, 7, 9, 11, 13"],
            ["562", "네이비, 카키", "3, 5, 7, 9, 11, 13"],
            ["561", "중청", "3, 5, 7, 9, 11, 13"],
            ["560", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"],
            ["559", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"],
            ["558", "크림아이, 진그린", "3, 5, 7, 9, 11, 13"],
            ["557", "베이지, 카키", "3, 5, 7, 9, 11, 13"],
            ["556", "베이지, 카키", "3, 5, 7, 9, 11, 13"],
            ["555", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9, 11, 13"],
            ["554", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9"],
            ["553", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9"],
            ["552", "아이보리, 인디연핑크", "3, 5, 7, 9, 11, 13"],
            ["551", "민트, 블랙, 스카이블루, 연베이지, 퍼플", "3, 5, 7, 9, 11"],
            ["550", "핑크, 소라", "FREE"],
            ["549", "핑크, 소라", "S원사이즈"],
            ["548", "핑크, 소라", "S, M"],
            ["547", "크림", "FREE"],
            ["546", "크림", "FREE"],
            ["545", "크림", "S원사이즈"],
            ["544", "크림", "S, M"],
            ["543", "블랙", "FREE"],
            ["542", "블랙", "FREE"],
            ["541", "블랙", "FREE"],
            ["540", "블랙", "S원사이즈"],
            ["539", "블랙", "S, M"],
            ["538", "스카이", "FREE"]
        ];

        function render() {
            const container = document.getElementById('product-list');
            let html = '';

            rawData.forEach((item, index) => {
                const code = item[0];
                const colorNames = item[1].split(', ').map(c => c.trim());
                const size = item[2];
                
                const imgUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${code}.jpg`;
                const pageUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;

                let colorListHtml = '<div class="color-list">';
                colorNames.forEach(c => {
                    const hex = colorPalette[c] || "#ddd";
                    colorListHtml += `
                        <div class="color-item">
                            <div class="chip" style="background-color: ${hex}"></div>
                            <span class="color-name">${c}</span>
                        </div>
                    `;
                });
                colorListHtml += '</div>';

                html += `
                    <a href="${pageUrl}" class="product-card">
                        <div class="img-box">
                            <div class="badge">NO.${index + 1}</div>
                            <img src="${imgUrl}" loading="lazy">
                        </div>
                        <div class="info-box">
                            ${colorListHtml}
                            <div class="size-info">SIZE: ${size}</div>
                        </div>
                    </a>
                `;
            });
            container.innerHTML = html;
        }
        render();
    </script>
</body>
</html>
