<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 모바일 슬라이드 카탈로그</title>
    <style>
        /* 모바일 전체 설정 */
        body { margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif; background: #fff; color: #222; -webkit-tap-highlight-color: transparent; }
        
        header { padding: 20px 15px; border-bottom: 1px solid #f0f0f0; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }

        /* 슬라이드 컨테이너 */
        .section-title { padding: 20px 15px 10px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .section-title span { font-size: 13px; color: #999; font-weight: normal; }

        .slide-container {
            display: flex;
            overflow-x: auto; /* 가로 스크롤 활성화 */
            scroll-snap-type: x mandatory; /* 스냅 기능으로 딱딱 끊기게 */
            padding: 0 15px 20px;
            gap: 12px;
            -webkit-overflow-scrolling: touch; /* 아이폰 부드러운 스크롤 */
        }
        .slide-container::-webkit-scrollbar { display: none; } /* 스크롤바 숨기기 */

        /* 상품 카드 설정 */
        .product-card {
            flex: 0 0 160px; /* 카드의 너비를 160px로 고정 (글씨 키우기 위함) */
            scroll-snap-align: start;
            text-decoration: none;
            color: inherit;
        }

        .img-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1.2; /* 약간 세로로 긴 형태로 세련되게 */
            border-radius: 8px;
            overflow: hidden;
            background: #f5f5f5;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 상품 번호 */
        .badge { position: absolute; top: 8px; left: 8px; background: #000; color: #fff; font-size: 12px; font-weight: bold; padding: 3px 7px; border-radius: 4px; }

        /* 텍스트 정보 (크게 키움) */
        .info-box { padding: 10px 2px; }
        .color-info { 
            font-size: 14px; /* 폰트 확대 */
            font-weight: 600; 
            color: #333; 
            display: block; 
            margin-bottom: 4px;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .size-info { 
            font-size: 13px; /* 폰트 확대 */
            color: #ef4444; /* 사이즈는 잘 보이게 붉은 계열 */
            font-weight: bold; 
        }

        .btn-more {
            display: block;
            width: calc(100% - 30px);
            margin: 10px auto 30px;
            padding: 15px;
            text-align: center;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            text-decoration: none;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">KIDS RIVER</div>
    </header>

    <!-- 첫 번째 줄 (예: 신상품) -->
    <div class="section-title">오늘의 신상 <span>옆으로 밀어보세요 ›</span></div>
    <div class="slide-container" id="slide-1"></div>

    <!-- 두 번째 줄 (예: 인기상품) -->
    <div class="section-title">잘 나가는 추천템 <span>전체보기</span></div>
    <div class="slide-container" id="slide-2"></div>

    <a href="#" class="btn-more">다른 상품 더보기</a>

    <script>
        const products = [
            { no: "01", img: "https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D566.jpg", link: "#", color: "그린, 머스타드, 베이지", size: "3-13호" },
            { no: "02", img: "https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D565.jpg", link: "#", color: "민트, 연보라", size: "3-13호" },
            { no: "03", img: "https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D564.jpg", link: "#", color: "베이지, 블루, 아이", size: "3-13호" },
            { no: "04", img: "https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D563.jpg", link: "#", color: "스카이청, 진청", size: "3-13호" },
            { no: "05", img: "https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D562.jpg", link: "#", color: "네이비, 카키", size: "3-13호" }
        ];

        function createCards(containerId, data) {
            const container = document.getElementById(containerId);
            data.forEach(p => {
                container.innerHTML += `
                    <a href="${p.link}" class="product-card">
                        <div class="img-box">
                            <div class="badge">${p.no}</div>
                            <img src="${p.img}" alt="상품">
                        </div>
                        <div class="info-box">
                            <span class="color-info">${p.color}</span>
                            <span class="size-info">${p.size}</span>
                        </div>
                    </a>
                `;
            });
        }

        // 슬라이드 데이터 채우기
        createCards('slide-1', products);
        createCards('slide-2', [...products].reverse()); // 두 번째 줄은 순서만 바꿔서 테스트
    </script>
</body>
</html>
