<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER CATALOG</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f8f8f8; overflow-x: hidden; }
        .slide-container { display: flex; overflow-x: auto; gap: 15px; padding: 20px; }
        .product-card { flex: 0 0 180px; background: #fff; border-radius: 15px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* [모달창] */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; overflow-y: auto; }
        #modal-img { display: block; width: 100%; max-width: 800px; margin: 0 auto; }

        /* [뒤로가기 버튼 - 중앙 왼쪽] */
        .floating-back-btn {
            position: fixed; top: 50%; left: 10px; transform: translateY(-50%);
            width: 48px; height: 48px; background: rgba(255,255,255,0.95); border-radius: 50%;
            z-index: 50000; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #eee;
        }
        .floating-back-btn::after { content: ''; width: 10px; height: 10px; border-top: 3.5px solid #111; border-left: 3.5px solid #111; transform: rotate(-45deg); margin-left: 5px; }

        /* [하단 고정 추천 바] */
        .recommend-section { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #fff; border-top: 1px solid #eee;
            padding: 15px 0 35px; z-index: 40000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }
        .recommend-title { font-size: 13px; font-weight: bold; margin-bottom: 12px; padding: 0 20px; }
        
        .recommend-list { 
            display: flex; gap: 12px; overflow-x: auto; padding: 0 20px;
            -webkit-overflow-scrolling: touch; 
            /* [중요] 아래 설정이 터치 영역을 고정시킴 */
            pointer-events: auto !important;
        }
        .recommend-list::-webkit-scrollbar { display: none; }

        .rec-item { 
            flex: 0 0 95px; cursor: pointer; text-align: center;
            /* 자식 요소들이 터치를 가로막지 않도록 설정 */
            pointer-events: all !important;
        }
        .rec-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid #f0f0f0; pointer-events: none; }
        .rec-code { font-size: 10px; font-weight: bold; color: #888; margin-top: 5px; pointer-events: none; }

        .modal-footer { padding: 40px 20px 250px; text-align: center; }
    </style>
</head>
<body>

    <div class="slide-container" id="product-list"></div>

    <div id="modal">
        <div class="floating-back-btn" onclick="closeModal()"></div>
        <img id="modal-img" src="">
        
        <div class="recommend-section">
            <div class="recommend-title">함께 코디하면 예뻐요 ✨ (옆으로 밀어보세요)</div>
            <div class="recommend-list" id="recommend-list"></div>
        </div>

        <div class="modal-footer">
            <div style="padding: 18px 50px; background: #111; color: #fff; border-radius: 35px; font-weight: bold;" onclick="closeModal()">LIST</div>
        </div>
    </div>

    <script>
        const rawData = [ 
            ["566", "그린", "3,5,7", ["565", "564", "563", "562", "561", "560", "559", "558", "557", "556", "555", "554", "553", "552", "551"]], 
            ["565", "민트", "3,5,7", ["566", "564", "563", "562", "561", "560", "559", "558", "557", "556", "555", "554", "553", "552", "551"]]
        ];

        function openModal(code) {
            const product = rawData.find(item => item[0] === code);
            if(!product) return;

            document.getElementById('modal-img').src = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;
            
            const recContainer = document.getElementById('recommend-list');
            let recHtml = '';
            
            product[3].forEach(recCode => {
                const recImg = `https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${recCode}.jpg`;
                // [해결책] onclick 대신 터치와 마우스 이벤트를 명시적으로 분리하여 강제 실행
                recHtml += `
                    <div class="rec-item" 
                         onmousedown="openModal('${recCode}')" 
                         ontouchend="openModal('${recCode}')">
                        <img src="${recImg}">
                        <div class="rec-code">NO.${recCode}</div>
                    </div>
                `;
            });
            
            recContainer.innerHTML = recHtml;
            recContainer.scrollLeft = 0;

            const modal = document.getElementById('modal');
            modal.style.display = 'block';
            modal.scrollTo(0, 0); 
            document.body.style.overflow = 'hidden';
            
            if(!window.history.state || !window.history.state.modalOpen) {
                history.pushState({modalOpen: true}, '');
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onpopstate = function() { closeModal(); };

        // 메인 리스트 렌더링
        const listBody = document.getElementById('product-list');
        rawData.forEach(item => {
            listBody.innerHTML += `
                <div class="product-card" onclick="openModal('${item[0]}')">
                    <img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${item[0]}.jpg" style="width:100%; border-radius:10px;">
                    <p style="text-align:center; font-weight:bold;">NO.${item[0]}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
