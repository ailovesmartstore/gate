<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - SMART CATALOG</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f8f8f8; overflow-x: hidden; }
        
        /* [메인 영역] */
        .slide-container { display: flex; overflow-x: auto; gap: 15px; padding: 20px; }
        .product-card { flex: 0 0 200px; background: #fff; border-radius: 15px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; border-radius: 10px; }

        /* [모달창] */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; overflow-y: auto; }
        #modal-img { display: block; width: 100%; max-width: 800px; margin: 0 auto; }

        /* [뒤로가기 버튼 - 중앙 왼쪽] */
        .floating-back-btn {
            position: fixed; top: 50%; left: 15px; transform: translateY(-50%);
            width: 45px; height: 45px; background: #fff; border-radius: 50%;
            z-index: 50000; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #eee;
        }
        .floating-back-btn::after { content: ''; width: 10px; height: 10px; border-top: 3px solid #222; border-left: 3px solid #222; transform: rotate(-45deg); margin-left: 4px; }

        /* [하단 고정 추천 바 - 터치 오류 해결의 핵심] */
        .recommend-section { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #ffffff; border-top: 1px solid #eee;
            padding: 15px 0 30px; z-index: 40000; /* 뒤로가기보다는 아래, 이미지보다는 위 */
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }
        .recommend-title { font-size: 13px; font-weight: bold; margin-bottom: 12px; padding: 0 20px; }
        
        .recommend-list { 
            display: flex; gap: 12px; overflow-x: scroll; padding: 0 20px;
            -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
            position: relative; z-index: 40001;
        }
        .recommend-list::-webkit-scrollbar { display: none; }

        /* 개별 아이템: 터치 영역을 강제로 최상단으로 확보 */
        .rec-item { 
            flex: 0 0 90px; cursor: pointer; position: relative; 
            z-index: 40005 !important; /* 모든 간섭을 무시하고 맨 위로 */
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .rec-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid #eee; pointer-events: none; }
        .rec-code { font-size: 10px; font-weight: bold; color: #888; margin-top: 5px; }

        .modal-footer { padding: 40px 20px 250px; text-align: center; }
    </style>
</head>
<body>

    <div class="slide-container" id="product-list"></div>

    <div id="modal">
        <div class="floating-back-btn" onclick="closeModal()"></div>
        <img id="modal-img" src="">
        
        <div class="recommend-section">
            <div class="recommend-title">함께 코디하면 예뻐요 ✨</div>
            <div class="recommend-list" id="recommend-list"></div>
        </div>

        <div class="modal-footer">
            <div style="padding: 15px 40px; background: #222; color: #fff; border-radius: 30px; display: inline-block;" onclick="closeModal()">닫기</div>
        </div>
    </div>

    <script>
        const rawData = [ 
            ["566", "그린", "3,5,7", ["565", "564", "563", "562", "561", "560", "559", "558", "557", "556", "555", "554", "553", "552", "551"]], 
            ["565", "민트", "3,5,7", ["566", "564", "563", "562", "561", "560", "559", "558", "557", "556", "555", "554", "553", "552", "551"]]
        ];

        function openModal(code) {
            const product = rawData.find(item => item[0] === code);
            if(!product) return;

            // 상세 이미지 교체
            document.getElementById('modal-img').src = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;
            
            // 추천 리스트 생성
            const recContainer = document.getElementById('recommend-list');
            let recHtml = '';
            
            product[3].forEach(recCode => {
                const recImg = `https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${recCode}.jpg`;
                // [수정] onclick, ontouchend를 모두 걸고 event.stopImmediatePropagation()으로 터치 씹힘 방지
                recHtml += `
                    <div class="rec-item" 
                         onclick="handleRecClick(event, '${recCode}')" 
                         ontouchend="handleRecClick(event, '${recCode}')">
                        <img src="${recImg}">
                        <div class="rec-code">NO.${recCode}</div>
                    </div>
                `;
            });
            
            recContainer.innerHTML = recHtml;
            recContainer.scrollLeft = 0; // 스크롤 초기화

            const modal = document.getElementById('modal');
            modal.style.display = 'block';
            modal.scrollTo(0, 0); 
            document.body.style.overflow = 'hidden';
            history.pushState({modalOpen: true}, '');
        }

        // [핵심 함수] 터치 이벤트를 강제로 가로채서 실행
        function handleRecClick(e, code) {
            e.preventDefault();
            e.stopImmediatePropagation();
            console.log("터치된 코드:", code); // 디버깅용
            openModal(code);
            return false;
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onpopstate = function() { closeModal(); };

        // 초기 렌더링
        const container = document.getElementById('product-list');
        rawData.forEach(item => {
            container.innerHTML += `
                <div class="product-card" onclick="openModal('${item[0]}')">
                    <img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${item[0]}.jpg">
                    <p style="text-align:center; font-weight:bold;">NO.${item[0]}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
