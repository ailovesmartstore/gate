<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 프리미엄 카탈로그</title>
    <style>
        body { margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif; background: #fff; color: #222; -webkit-tap-highlight-color: transparent; }
        header { padding: 20px 15px; border-bottom: 1px solid #f0f0f0; text-align: center; }
        .logo { font-size: 24px; font-weight: 900; }
        .section-title { padding: 25px 15px 12px; font-size: 19px; font-weight: bold; }
        .slide-container { display: flex; overflow-x: auto; padding: 0 15px 10px; gap: 14px; -webkit-overflow-scrolling: touch; }
        .slide-container::-webkit-scrollbar { display: none; }

        .product-card { flex: 0 0 170px; text-decoration: none; color: inherit; display: block; }
        .img-box { position: relative; width: 100%; aspect-ratio: 1/1.2; border-radius: 10px; overflow: hidden; background: #f8f8f8; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; font-size: 11px; font-weight: bold; padding: 3px 7px; border-radius: 4px; }

        .info-box { padding: 12px 2px 5px; }
        
        /* 컬러 칩 스타일 */
        .color-chips { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
        .chip { width: 15px; height: 15px; border-radius: 50%; border: 1px solid #eee; }
        
        .product-name { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 4px; display: block; }
        .size-info { font-size: 14px; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <header><div class="logo">KIDS RIVER</div></header>

    <div class="section-title">오늘의 신상</div>
    <div class="slide-container" id="category-new"></div>

    <script>
        // 요청하신 색상들에 대한 컬러 코드 정의
        const colorPalette = {
            "핑크": "#FFC0CB",
            "그린": "#4CAF50",
            "블루": "#2196F3",
            "메란지": "#E0E0E0", // 밝은 회색 느낌
            "블랙": "#000000"
        };

        const productData = [
            { 
                no: "01", 
                name: "1+1ST반팔티셔츠+무지나시",
                img: "https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D566.jpg", 
                link: "https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D566.jpg", 
                colors: ["핑크", "그린", "블루", "메란지", "블랙"], 
                size: "3호-13호" 
            },
            { 
                no: "02", 
                name: "1+1ST반팔티셔츠+무지나시",
                img: "https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D565.jpg", 
                link: "https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D565.jpg", 
                colors: ["핑크", "그린", "블루", "메란지", "블랙"], 
                size: "3호-13호" 
            }
        ];

        function renderProducts(containerId, items) {
            const container = document.getElementById(containerId);
            let html = '';
            
            items.forEach(item => {
                // 컬러 칩 HTML 생성
                let chipHtml = '<div class="color-chips">';
                item.colors.forEach(c => {
                    const colorCode = colorPalette[c] || "#eee"; 
                    chipHtml += `<div class="chip" style="background-color: ${colorCode}" title="${c}"></div>`;
                });
                chipHtml += '</div>';

                html += `
                    <a href="${item.link}" target="_self" class="product-card">
                        <div class="img-box">
                            <div class="badge">${item.no}</div>
                            <img src="${item.img}" alt="${item.name}">
                        </div>
                        <div class="info-box">
                            <span class="product-name">${item.name}</span>
                            ${chipHtml}
                            <div class="size-info">${item.size}</div>
                        </div>
                    </a>
                `;
            });
            container.innerHTML = html;
        }

        renderProducts('category-new', productData);
    </script>
</body>
</html>
