<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 모바일 카탈로그</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff; color: #222; -webkit-tap-highlight-color: transparent; }
        header { padding: 20px 15px; border-bottom: 1px solid #f0f0f0; text-align: center; }
        .logo { font-size: 24px; font-weight: 900; }
        .section-title { padding: 25px 15px 12px; font-size: 19px; font-weight: bold; }
        .slide-container { display: flex; overflow-x: auto; padding: 0 15px 10px; gap: 14px; -webkit-overflow-scrolling: touch; }
        .slide-container::-webkit-scrollbar { display: none; }
        .product-card { flex: 0 0 170px; text-decoration: none; color: inherit; display: block; }
        .img-box { position: relative; width: 100%; aspect-ratio: 1/1.2; border-radius: 10px; overflow: hidden; background: #f8f8f8; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; font-size: 12px; font-weight: bold; padding: 3px 8px; border-radius: 5px; }
        .info-box { padding: 12px 2px 5px; }
        .color-info { font-size: 15px; font-weight: 700; color: #333; display: block; margin-bottom: 5px; }
        .size-info { font-size: 14px; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

    <header><div class="logo">KIDS RIVER</div></header>

    <div class="section-title">오늘의 신상</div>
    <div class="slide-container" id="category-new"></div>

    <script>
        // ★★★ 사장님, 바로 이 아래 'link' 부분을 보세요! ★★★
        const productData = [
            { 
                no: "01", 
                img: "test.jpg",    // 보여지는 이미지
                link: "test.jpg",   // 눌렀을 때 이동할 주소 (파일명을 직접 적음)
                color: "테스트 상품", 
                size: "3호-13호" 
            },
            { 
                no: "02", 
                img: "test.jpg", 
                link: "test.jpg",   // 클릭 시 test.jpg가 크게 뜹니다
                color: "연결 확인용", 
                size: "전사이즈" 
            }
        ];

        function renderProducts(containerId, items) {
            const container = document.getElementById(containerId);
            let html = '';
            items.forEach(item => {
                // target="_self"로 바꾸어 현재 창에서 바로 열리게 했습니다.
                html += `
                    <a href="${item.link}" target="_self" class="product-card">
                        <div class="img-box">
                            <div class="badge">${item.no}</div>
                            <img src="${item.img}" alt="상품">
                        </div>
                        <div class="info-box">
                            <span class="color-info">${item.color}</span>
                            <span class="size-info">${item.size}</span>
                        </div>
                    </a>
                `;
            });
            container.innerHTML = html;
        }

        renderProducts('category-new', productData);
    </script>
</body>
</html>
