<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - T-SHIRTS</title>
    <style>
        :root {
            --bg: #f5f6f8;
            --panel: #ffffff;
            --ink: #202124;
            --muted: #7b8088;
            --line: #e7e9ee;
            --point: #477bb7;
            --point-soft: #e8f1fb;
            --price: #e83f36;
            --shadow: 0 10px 28px rgba(26, 39, 59, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(71, 123, 183, 0.13), transparent 32%),
                linear-gradient(180deg, #fbfcfe 0%, var(--bg) 220px);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        .app-shell {
            width: min(100%, 760px);
            margin: 0 auto;
            min-height: 100vh;
        }

        .header-filter {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 14px 14px 12px;
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(231, 233, 238, 0.9);
            backdrop-filter: blur(16px);
        }

        .brand-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .brand-title {
            margin: 0;
            font-size: 22px;
            line-height: 1;
            letter-spacing: 0;
            font-weight: 900;
        }

        .brand-sub {
            display: block;
            margin-top: 5px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }

        .count-pill {
            flex: 0 0 auto;
            padding: 7px 10px;
            border-radius: 999px;
            background: var(--point-soft);
            color: #2f659f;
            font-size: 12px;
            font-weight: 800;
        }

        .search-wrap {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            width: 18px;
            height: 18px;
            transform: translateY(-50%);
            color: #8c929b;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            height: 48px;
            padding: 0 14px 0 42px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #f8f9fb;
            color: var(--ink);
            font-size: 15px;
            font-weight: 650;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        .search-input::placeholder {
            color: #a1a6ae;
            font-weight: 600;
        }

        .search-input:focus {
            border-color: rgba(71, 123, 183, 0.75);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(71, 123, 183, 0.12);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 13px;
            padding: 14px;
            padding-bottom: 86px;
        }

        .product-card {
            position: relative;
            min-width: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--panel);
            border: 1px solid rgba(231, 233, 238, 0.9);
            border-radius: 12px;
            box-shadow: 0 5px 18px rgba(27, 39, 56, 0.06);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .product-card:active {
            transform: scale(0.985);
            box-shadow: var(--shadow);
            border-color: rgba(71, 123, 183, 0.26);
        }

        .image-wrap {
            position: relative;
            background: #edf0f4;
        }

        .p-no {
            position: absolute;
            left: 8px;
            top: 8px;
            z-index: 2;
            min-width: 48px;
            padding: 5px 8px;
            border-radius: 999px;
            background: rgba(32, 33, 36, 0.82);
            color: #fff;
            font-size: 10px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 0;
            backdrop-filter: blur(8px);
        }

        .product-card img {
            width: 100%;
            aspect-ratio: 1 / 1.08;
            object-fit: cover;
            display: block;
        }

        .p-info {
            min-width: 0;
            padding: 10px 10px 11px;
            display: flex;
            flex: 1;
            flex-direction: column;
            gap: 7px;
        }

        .p-name {
            min-height: 37px;
            color: #17191d;
            font-size: 14px;
            font-weight: 850;
            line-height: 1.32;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: keep-all;
        }

        .p-size {
            max-width: 100%;
            width: fit-content;
            padding: 4px 8px;
            border-radius: 8px;
            background: #f0f3f7;
            color: #4f5864;
            font-size: 11px;
            line-height: 1.25;
            font-weight: 750;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .p-chips {
            display: flex;
            gap: 5px;
            min-height: 16px;
            flex-wrap: wrap;
        }

        .chip-dot {
            width: 15px;
            height: 15px;
            flex: 0 0 15px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.16);
        }

        .p-color-txt {
            min-height: 28px;
            color: var(--muted);
            font-size: 11px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .p-price {
            margin-top: auto;
            padding-top: 2px;
            color: var(--price);
            font-size: 17px;
            font-weight: 950;
            line-height: 1;
        }

        .no-result {
            grid-column: 1 / -1;
            margin-top: 50px;
            padding: 34px 18px;
            border: 1px dashed #d8dce3;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            color: #8c929b;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
        }

        @media (min-width: 640px) {
            .header-filter { padding: 18px 18px 14px; }
            .product-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 16px;
                padding: 18px;
            }
        }
    </style>
</head>
<body>
<main class="app-shell">
    <div class="header-filter">
        <div class="brand-row">
            <h1 class="brand-title">
                KIDS RIVER
                <span class="brand-sub">T-SHIRTS COLLECTION</span>
            </h1>
            <div class="count-pill" id="resultCount">0개</div>
        </div>
        <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Zm5.2-2.1 4.5 4.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            <input type="text" id="mainSearch" class="search-input" placeholder="상품명 또는 번호 검색" oninput="renderList()">
        </div>
    </div>

    <div class="product-grid" id="productList"></div>
</main>

<script>
    const rawData = [
        ["1", "미카크롭나시티셔츠", "8900", "아이보리, 블랙", "S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/29/600600/4M29D30.jpg"],
        ["2", "플레인티셔츠(나시)", "9900", "아이보리, 블랙", "S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/29/600600/4M29D28.jpg"],
        ["3", "기본골지끈티셔츠(나시)", "9900", "아이, 검정", "5, 7, 9, 11, 13", "https://mododome.diskn.com/gilgil/2026/4M/27/600600/4M27D5.jpg"],
        ["4", "레이어드티셔츠(나시)", "9900", "아이, 검정", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D459.jpg"],
        ["5", "여름오버핏티셔츠", "9900", "아이, 검정, 크림", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D460.jpg"],
        ["6", "하트컬러티셔츠", "9900", "검정, 회색, 백색, 노랑, 민트, 핑크", "S, M, L, XL, XXL", "https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D454.jpg"],
        ["7", "코튼박스티셔츠", "9900", "크림, 백멜란지, 딥차콜, 딸기우유, 연소라, 라일락, 레몬, 올리브, 라임, 살구", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/16/600600/4M16D473.jpg"],
        ["8", "아이스크림티셔츠", "9900", "아이, 핑크, 민트카키, 초코", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D427.jpg"],
        ["9", "에센셜날라리티셔츠", "9900", "검정, 아이", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D447.jpg"],
        ["10", "절개스티치티셔츠", "9900", "검정, 네이비, 크림, 아이", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D433.jpg"],
        ["11", "포켓데님티셔츠", "9900", "아이, 크림", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D439.jpg"],
        ["12", "굿데이세미크롭티셔츠", "9900", "엘로, 블루", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/16/600600/4M16D504.jpg"],
        ["13", "스트라이프끈티셔츠(나시)", "9900", "블랙, 옐로, 그린, 핑크, 연소라", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/16/600600/4M16D461.jpg"],
        ["14", "슬림나그랑티셔츠", "9900", "핑크, 아이보리, 라일락", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/16/600600/4M16D491.jpg"],
        ["15", "뉴욕입체티셔츠", "9900", "아이, 검정, 버건디, 인디블루", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D429.jpg"],
        ["16", "러브띵스티셔츠", "9900", "아이, 그린, 베이비블루", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D431.jpg"],
        ["17", "마리랍바티셔츠", "9900", "검정, 네이비, 스카이블루", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D426.jpg"],
        ["18", "요루슬라브날라리티셔츠", "9900", "검정, 아이, 핑크", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D449.jpg"],
        ["19", "챔피언티셔츠", "9900", "메란지, 네이비, 옐로우", "XS, S, M, L, XL", "https://mododome.diskn.com/gilgil/2026/4M/22/600600/4M22D428.jpg"]
    ];

    const colorMap = {
        "아이보리": "#fff9e8", "아이": "#fff9e8", "백색": "#ffffff", "크림": "#fff3c7",
        "블랙": "#111111", "검정": "#111111", "회색": "#969ba3", "메란지": "#b7bbc1", "백멜란지": "#d7d9dd",
        "차콜": "#39424e", "딥차콜": "#2f3740", "노랑": "#ffe45c", "옐로": "#ffe45c", "엘로": "#ffe45c", "옐로우": "#ffe45c", "레몬": "#fff56b",
        "민트": "#9fe6dc", "민트카키": "#9abda2", "핑크": "#f7b6cf", "딸기우유": "#ffc3d5", "연소라": "#abd7f2", "소라": "#abd7f2",
        "스카이블루": "#8fcdf0", "블루": "#4b88dc", "베이비블루": "#b8daf7", "인디블루": "#54759d",
        "네이비": "#192957", "버건디": "#782033", "그린": "#55ad65", "라벤더": "#ded4ff", "라일락": "#d9c7f2",
        "올리브": "#839461", "라임": "#b8df59", "살구": "#ffc39c", "초코": "#6b4736"
    };

    function renderList() {
        const keyword = document.getElementById("mainSearch").value.trim().toLowerCase();
        const container = document.getElementById("productList");
        const resultCount = document.getElementById("resultCount");

        const filteredData = rawData.filter(item => {
            const searchText = `${item[0]} ${item[1]} ${item[3]} ${item[4]}`.toLowerCase();
            return searchText.includes(keyword);
        });

        resultCount.textContent = `${filteredData.length}개`;

        if (filteredData.length === 0) {
            container.innerHTML = `<div class="no-result">검색 결과가 없습니다.</div>`;
            return;
        }

        container.innerHTML = filteredData.map(item => {
            const colors = item[3].split(",").map(c => c.trim());
            const chipsHtml = colors.map(colorName => {
                const colorHex = colorMap[colorName] || "#dddddd";
                return `<span class="chip-dot" style="background:${colorHex}" title="${colorName}"></span>`;
            }).join("");

            return `
                <article class="product-card">
                    <div class="image-wrap">
                        <div class="p-no">NO.${item[0]}</div>
                        <img src="${item[5]}" alt="${item[1]}" loading="lazy">
                    </div>
                    <div class="p-info">
                        <div class="p-name">${item[1]}</div>
                        <div class="p-size">${item[4]}</div>
                        <div class="p-chips">${chipsHtml}</div>
                        <div class="p-color-txt">${item[3]}</div>
                        <div class="p-price">${Number(item[2]).toLocaleString()}원</div>
                    </div>
                </article>
            `;
        }).join("");
    }

    renderList();
</script>
</body>
</html>
