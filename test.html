<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 4월 신상 카탈로그</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            font-family: 'Noto Sans KR', sans-serif; 
            background: #fff; 
            color: #333; 
            -webkit-tap-highlight-color: transparent; 
            letter-spacing: -0.03em;
        }
        
        header { 
            padding: 30px 15px; 
            text-align: center; 
        }
        
        .logo { 
            font-size: 28px; 
            font-weight: 900; 
            letter-spacing: -1px; 
            color: #1a1a1a;
        }

        .section-title { 
            padding: 10px 20px 20px; 
            font-size: 18px; 
            font-weight: 700; 
            text-align: center; /* 제목도 가운데 정렬 */
            color: #444;
        }

        .slide-container { 
            display: flex; 
            overflow-x: auto; 
            padding: 0 20px 40px; 
            gap: 20px; 
            -webkit-overflow-scrolling: touch; 
        }
        .slide-container::-webkit-scrollbar { display: none; }

        .product-card { 
            flex: 0 0 190px; 
            text-decoration: none; 
            color: inherit; 
            display: block;
            text-align: center; /* 모든 텍스트를 가운데로 */
        }

        .img-box { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 1/1.2; 
            border-radius: 18px; 
            overflow: hidden; 
            background: #f1f1f1; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.04); 
            margin-bottom: 15px;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .product-card:active img { transform: scale(1.05); } /* 터치 시 살짝 커지는 효과 */
        
        .badge { 
            position: absolute; 
            top: 12px; 
            left: 50%; 
            transform: translateX(-50%); /* 번호 배지도 가운데로 */
            background: rgba(255,255,255,0.9); 
            color: #000; 
            font-size: 10px; 
            font-weight: 700; 
            padding: 4px 10px; 
            border-radius: 20px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .info-box { padding: 5px 0; }
        
        /* 컬러 리스트 가로형 가운데 정렬 */
        .color-list { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap;
            gap: 8px; 
            margin-bottom: 12px; 
        }
        .color-item { 
            display: flex; 
            align-items: center; 
            gap: 4px; 
        }
        .chip { 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            border: 1px solid rgba(0,0,0,0.1); 
        }
        .color-name { 
            font-size: 12px; 
            color: #888; 
            font-weight: 400; 
        }
        
        /* 세련된 사이즈 정보 디자인 */
        .size-info { 
            font-size: 11px; 
            color: #555; 
            font-weight: 600; 
            background: #f5f5f5; 
            padding: 6px 12px; 
            border-radius: 4px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .size-label {
            display: block;
            font-size: 9px;
            color: #bbb;
            margin-bottom: 3px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header><div class="logo">KIDS RIVER</div></header>

    <div class="section-title">TODAY'S NEW ARRIVALS</div>
    <div class="slide-container" id="product-list"></div>

    <script>
        const colorPalette = {
            "그린": "#4CAF50", "머스타드": "#FFC107", "베이지": "#F5F5DC", "아이": "#FFFFF0", "퍼플": "#A020F0",
            "민트": "#98FF98", "연보라": "#E6E6FA", "블루": "#2196F3", "카키": "#4B5320", "핑크": "#FFC0CB",
            "스카이청": "#87CEEB", "진청": "#00008B", "네이비": "#000080", "중청": "#5F9EA0", "블랙": "#000000",
            "스카이블루": "#87CEFA", "체리레드": "#D2042D", "크림아이": "#FFFDD0", "진그린": "#006400",
            "아이보리": "#FFFFF0", "인디핑크": "#B76E79", "인디연핑크": "#FADADD", "소라": "#82B5ED", "크림": "#FFFDD0",
            "스카이": "#87CEEB", "연베이지": "#F5F5DC"
        };

        const rawData = [
            ["566", "그린, 머스타드, 베이지, 아이, 퍼플", "3, 5, 7, 9, 11, 13"],
            ["565", "민트, 연보라", "3, 5, 7, 9, 11, 13"],
            ["564", "베이지, 블루, 아이, 카키, 핑크", "3, 5, 7, 9, 11, 13"],
            ["563", "스카이청, 진청", "3, 5, 7, 9, 11, 13"],
            ["562", "네이비, 카키", "3, 5, 7, 9, 11, 13"],
            ["561", "중청", "3, 5, 7, 9, 11, 13"],
            ["560", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"],
            ["559", "그린, 블랙, 스카이블루, 체리레드", "3, 5, 7, 9, 11, 13"],
            ["558", "크림아이, 진그린", "3, 5, 7, 9, 11, 13"],
            ["557", "베이지, 카키", "3, 5, 7, 9, 11, 13"],
            ["556", "베이지, 카키", "3, 5, 7, 9, 11, 13"],
            ["555", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9, 11, 13"],
            ["554", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9"],
            ["553", "베이지, 블루, 아이보리, 인디핑크, 카키", "3, 5, 7, 9"],
            ["552", "아이보리, 인디연핑크", "3, 5, 7, 9, 11, 13"],
            ["551", "민트, 블랙, 스카이블루, 연베이지, 퍼플", "3, 5, 7, 9, 11"],
            ["550", "핑크, 소라", "FREE"],
            ["549", "핑크, 소라", "S원사이즈"],
            ["548", "핑크, 소라", "S, M"],
            ["547", "크림", "FREE"],
            ["546", "크림", "FREE"],
            ["545", "크림", "S원사이즈"],
            ["544", "크림", "S, M"],
            ["543", "블랙", "FREE"],
            ["542", "블랙", "FREE"],
            ["541", "블랙", "FREE"],
            ["540", "블랙", "S원사이즈"],
            ["539", "블랙", "S, M"],
            ["538", "스카이", "FREE"]
        ];

        function render() {
            const container = document.getElementById('product-list');
            let html = '';

            rawData.forEach((item, index) => {
                const code = item[0];
                const colorNames = item[1].split(', ').map(c => c.trim());
                const size = item[2];
                
                const imgUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${code}.jpg`;
                const pageUrl = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;

                let colorListHtml = '<div class="color-list">';
                colorNames.forEach(c => {
                    const hex = colorPalette[c] || "#ddd";
                    colorListHtml += `
                        <div class="color-item">
                            <div class="chip" style="background-color: ${hex}"></div>
                            <span class="color-name">${c}</span>
                        </div>
                    `;
                });
                colorListHtml += '</div>';

                html += `
                    <a href="${pageUrl}" class="product-card">
                        <div class="img-box">
                            <div class="badge">ITEM ${code}</div>
                            <img src="${imgUrl}" loading="lazy">
                        </div>
                        <div class="info-box">
                            ${colorListHtml}
                            <span class="size-label">AVAILABLE SIZE</span>
                            <div class="size-info">${size}</div>
                        </div>
                    </a>
                `;
            });
            container.innerHTML = html;
        }
        render();
    </script>
</body>
</html>
