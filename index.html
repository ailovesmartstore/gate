<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 키즈리버</title>
    <style>
        :root {
            --bg-color: #fcfcf9;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg-color); 
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }

        /* 헤더 영역: 280px 고정 및 로고 잘림 방지 */
        header { 
            padding: 10px 0; 
            text-align: center; 
        }
        
        .logo-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 280px; /* 요청하신 대로 280px 고정 */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .brand-intro { margin-top: -10px; padding: 0 20px; opacity: 0.5; text-align: center; }
        .brand-intro h1 { font-size: 13px; font-weight: 700; color: #444; letter-spacing: 1px; margin-bottom: 4px; }
        .brand-intro p { margin: 0; font-size: 10px; color: #888; }

        .container {
            max-width: 500px; margin: 0 auto; padding: 10px 16px 80px;
            display: flex; flex-direction: column; gap: 12px;
        }

        /* 카드 및 기타 스타일 */
        .card {
            position: relative;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            cursor: pointer;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }
        .big-card-top {
            position: relative; z-index: 2;
            padding: 30px 20px 10px;
            text-decoration: none; color: #fff;
            display: flex; justify-content: space-between; align-items: center;
        }
        .big-card-top h2 { font-size: 1.15rem; margin: 0; font-weight: 800; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .big-card-top span { font-size: 10px; opacity: 0.9; font-weight: 600; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 12px; }
        .sub-wrap { position: relative; z-index: 3; padding: 0 20px 25px; display: flex; flex-wrap: wrap; gap: 8px; }
        .chip {
            text-decoration: none; font-size: 11px; color: #fff;
            background: rgba(0, 0, 0, 0.4);
            padding: 7px 14px; border-radius: 12px;
            font-weight: 700; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .center-card { height: 110px; text-decoration: none; display: flex; align-items: center; justify-content: center; position: relative; z-index: 2; color: #fff; }
        .center-card h2 { font-size: 1.05rem; margin: 0; font-weight: 800; text-shadow: 0 2px 6px rgba(0,0,0,0.5); }

        /* 배경 이미지 (경로에 맞게 파일 준비 필요) */
        .bg-stock { background: linear-gradient(135deg, #7ba8d2 0%, #9bc1e5 100%); }
        .card.outer { background-image: url('outer.jpg'); }
        .card.tops { background-image: url('tee.jpg'); }
        .card.bottoms { background-image: url('pants.jpg'); }
        .card.acc { background-image: url('acc.jpg'); }
        .card.dress { background-image: url('onepiece.jpg'); }
        .card.setup { background-image: url('set.jpg'); }

        footer { text-align: center; padding: 40px 20px; font-size: 10px; color: #ccc; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <iframe src="logo.html" scrolling="no"></iframe>
    </div>
    <div class="brand-intro">
        <h1>아이옷 통합 카탈로그</h1>
        <p>20,000여 가지 아동복 실시간 업데이트</p>
    </div>
</header>

<div class="container">
    <!-- 이하 카탈로그 메뉴 생략 (이전과 동일) -->
    <div class="card bg-stock" onclick="location.href='stock_list.html'">
        <div class="center-card" style="justify-content: space-between; padding: 0 20px; height: 75px;">
            <h2 style="font-size: 1.1rem;">실시간 재고보유 ✨</h2>
            <span style="font-size: 10px; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 10px;">전체보기 ></span>
        </div>
    </div>
    <div class="card outer" onclick="location.href='outer_all.html'">
        <div class="big-card-top"><h2>아우터</h2><span>전체보기 ></span></div>
        <div class="sub-wrap" onclick="event.stopPropagation();"><a href="outer_cardigan.html" class="chip">가디건</a></div>
    </div>
    <div class="card tops" onclick="location.href='tops_all.html'">
        <div class="big-card-top"><h2>상의</h2><span>전체보기 ></span></div>
        <div class="sub-wrap" onclick="event.stopPropagation();">
            <a href="tops_tshirts.html" class="chip">티&맨투맨&후드티</a>
            <a href="tops_knit.html" class="chip">조끼&니트&스웨터</a>
        </div>
    </div>
    <!-- ... 나머지 카드들 ... -->
</div>

<footer>© KIDS RIVER</footer>
</body>
</html>
