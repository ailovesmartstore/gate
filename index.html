<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 키즈리버</title>
    <style>
        :root {
            --main-blue: #6ca0d1;
            --bg-color: #f9f8f3;
            --card-bg: #ffffff;
            --text-dark: #333;
            --text-gray: #777;
            --border-color: #eee;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background: var(--bg-color); 
            text-align: center; color: var(--text-dark);
            -webkit-tap-highlight-color: transparent;
        }

        /* 헤더 디자인을 조금 더 감성적으로 */
        .logo-area { padding: 50px 20px 25px; }
        .logo-area img { width: 140px; height: auto; }

        .intro-text { margin-bottom: 35px; }
        .intro-text h1 { font-size: 24px; font-weight: 800; margin: 0; color: #222; }
        .intro-text p { font-size: 11px; color: #bbb; margin-top: 6px; letter-spacing: 2px; }

        /* 그리드 컨테이너: 여백을 미세하게 조정 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            padding: 0 20px 60px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 카테고리 카드 박스: 입체감 부여 */
        .category-box {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }
        .category-box:active { transform: translateY(2px); }

        /* [전체보기] 상단 영역 */
        .view-all-btn {
            padding: 22px 10px;
            background: #fff;
            text-decoration: none;
            color: var(--text-dark);
            border-bottom: 1px dashed var(--border-color);
            transition: background 0.2s;
        }
        .view-all-btn h2 { font-size: 17px; margin: 0; font-weight: 700; }
        .view-all-btn span { font-size: 10px; color: var(--main-blue); display: block; margin-top: 5px; font-weight: bold; }

        /* 소분류 버튼 영역 */
        .sub-menu-area {
            padding: 15px 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 7px;
            background: #fdfdfd;
            flex-grow: 1;
        }

        /* 소분류 개별 버튼: 동글동글하게 */
        .sub-item {
            text-decoration: none;
            color: var(--text-gray);
            font-size: 11px;
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #efefef;
            border-radius: 10px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .sub-item:active { background: var(--main-blue); color: #fff; border-color: var(--main-blue); }

        /* 단일 카테고리 (소분류 없는 경우 수직 중앙 정렬) */
        .single-link { height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 40px 10px !important; border-bottom: none !important; }

        /* 강조 (재고보유) */
        .stock-box { 
            border: none; 
            background: linear-gradient(145deg, #6ca0d1, #8eb7e0);
            box-shadow: 0 10px 25px rgba(108, 160, 209, 0.2);
        }
        .stock-box .view-all-btn { background: transparent; border: none; }
        .stock-box .view-all-btn h2 { color: #fff; }
        .stock-box .view-all-btn span { color: rgba(255,255,255,0.85); }

        footer { font-size: 10px; color: #ccc; padding-bottom: 50px; letter-spacing: 1px; }
    </style>
</head>
