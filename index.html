<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 키즈리버</title>
    <style>
        :root {
            --point-blue: #7ba8d2;
            --soft-pink: #fbe4e4;
            --soft-yellow: #fef5d4;
            --soft-green: #e2f0d9;
            --soft-purple: #ece6f2;
            --bg-color: #fcfcf9;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg-color); 
            color: #333;
            -webkit-tap-highlight-color: transparent; /* 모바일 클릭 시 파란 박스 제거 */
        }

        header { 
            padding: 80px 20px 50px; 
            text-align: center;
            background: #fff;
            border-radius: 0 0 60px 60px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.03);
        }

        header img { 
            width: 250px; 
            max-width: 80%; 
            height: auto; 
            margin-bottom: 25px; 
        }

        .brand-intro { margin-top: 15px; }
        .brand-intro p { margin: 0; font-size: 12px; font-weight: 500; color: #bbb; letter-spacing: 4px; }
        .brand-intro h3 { margin: 12px 0 0; font-size: 22px; font-weight: 800; color: #444; letter-spacing: -0.5px; }

        .container {
            max-width: 500px; margin: 0 auto; padding: 40px 20px 120px;
            display: flex; flex-direction: column; gap: 26px;
        }

        /* --- [클릭 효과 추가 영역] --- */
        .card {
            background: #fff; border-radius: 32px; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s; /* 부드러운 튀어오름 효과 */
            cursor: pointer;
        }

        /* 클릭(터치) 시 카드가 작아지면서 들어가는 효과 */
        .card:active { 
            transform: scale(0.96); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .card-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 26px 26px 20px; text-decoration: none; color: inherit;
        }
        .card-top h2 { font-size: 1.2rem; margin: 0; font-weight: 800; }
        .card-top span { font-size: 11px; font-weight: 700; opacity: 0.7; transition: transform 0.3s; }

        /* 카드 클릭 시 우측 화살표가 살짝 움직이는 디테일 */
        .card:active .card-top span { transform: translateX(5px); }
        
        .card.outer { border-left: 12px solid var(--point-blue); }
        .card.tops { border-left: 12px solid var(--soft-pink); }
        .card.bottoms { border-left: 12px solid var(--soft-green); }
        .card.acc { border-left: 12px solid var(--soft-purple); }

        .sub-wrap {
            padding: 0 26px 26px; display: flex; flex-wrap: wrap; gap: 10px;
        }

        /* 소분류 칩 클릭 효과 */
        .chip {
            text-decoration: none; font-size: 12px; color: #666;
            background: #f8f8f8; padding: 10px 18px; border-radius: 15px;
            font-weight: 600; border: 1px solid #eee;
            transition: all 0.2s;
        }

        /* 소분류 클릭 시 배경색이 바뀌는 피드백 */
        .chip:active { 
            background: var(--point-blue); 
            color: #fff; 
            border-color: var(--point-blue);
            transform: translateY(-2px);
        }

        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-card {
            padding: 40px 20px; text-align: center; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .grid-card h2 { font-size: 1.15rem; margin: 0; font-weight: 800; }
        .grid-card span { font-size: 10px; font-weight: 600; color: rgba(0,0,0,0.3); }

        footer { text-align: center; padding: 80px 20px; font-size: 10px; color: #bbb; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="grid-half">

        </div>
        <div class="card" style="background: var(--soft-purple);">

        <div class="card">

        </div>
        <div class="card">

    </div>
</div>

<footer>© KIDS RIVER</footer>
