<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 키즈리버</title>
    <style>
        :root {
            --point-blue: #7ba8d2;
            --soft-pink: #fbe4e4;
            --soft-yellow: #fef5d4;
            --soft-green: #e2f0d9;
            --soft-purple: #ece6f2;
            --bg-color: #fcfcf9;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg-color); 
            color: #333;
        }

        header { 
            padding: 30px 20px 10px; 
            text-align: center;
            background: #fff;
        }
        header img { width: 100px; height: auto; }
        
        /* 배너를 키우고 텍스트 박스를 제거한 레이아웃 */
        .main-banner {
            margin: 15px auto 25px;
            max-width: 100%; /* 너비를 꽉 채우거나 조절 */
            height: 320px; /* 높이를 키워 시원하게 노출 */
            background: #eee url('image_388bc1.png') center/cover no-repeat;
            display: flex;
            align-items: flex-end; /* 텍스트를 하단에 배치해 이미지 중심을 살림 */
            justify-content: center;
            position: relative;
            overflow: hidden;
            /* 모서리를 살짝 둥글게 하거나 배경에 따라 조정 가능 */
        }
        
        /* 이미지 위 글자가 잘 보이도록 하단에만 은은한 그림자 추가 */
        .main-banner::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
        }

        .banner-text {
            position: relative;
            z-index: 1;
            padding-bottom: 40px; /* 하단 여백 */
            text-align: center;
            color: #fff;
        }
        .banner-text p { margin: 0; font-size: 12px; font-weight: 500; letter-spacing: 2px; opacity: 0.9; }
        .banner-text h3 { margin: 8px 0 0; font-size: 24px; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }

        .container {
            max-width: 500px; margin: 0 auto; padding: 0 20px 100px;
            display: flex; flex-direction: column; gap: 24px;
        }

        .card {
            background: #fff; border-radius: 30px; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
        }

        .card-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 24px 18px; text-decoration: none; color: inherit;
        }
        .card-top h2 { font-size: 1.15rem; margin: 0; font-weight: 800; }
        .card-top span { font-size: 11px; font-weight: 700; opacity: 0.7; }
        
        .card.outer { border-left: 10px solid var(--point-blue); }
        .card.tops { border-left: 10px solid var(--soft-pink); }
        .card.bottoms { border-left: 10px solid var(--soft-green); }
        .card.acc { border-left: 10px solid var(--soft-purple); }

        .sub-wrap {
            padding: 0 24px 24px; display: flex; flex-wrap: wrap; gap: 8px;
        }
        .chip {
            text-decoration: none; font-size: 11.5px; color: #666;
            background: #f8f8f8; padding: 9px 16px; border-radius: 14px;
            font-weight: 600; border: 1px solid #eee;
        }

        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .grid-card {
            padding: 35px 20px; text-align: center; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .grid-card h2 { font-size: 1.1rem; margin: 0; font-weight: 800; }
        .grid-card span { font-size: 10px; font-weight: 600; color: rgba(0,0,0,0.3); }

        footer { text-align: center; padding: 60px 20px; font-size: 10px; color: #bbb; }
    </style>
</head>
