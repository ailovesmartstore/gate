<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 키즈리버</title>
    <style>
        :root {
            --point-blue: #7ba8d2;
            --soft-pink: #fbe4e4;
            --soft-yellow: #fef5d4;
            --soft-green: #e2f0d9;
            --soft-purple: #ece6f2;
            --bg-color: #fcfcf9;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: var(--bg-color); 
            color: #333;
            line-height: 1.5;
        }

        /* 헤더 디자인 강화 */
        header { 
            padding: 50px 20px 30px; 
            text-align: center;
            background: #fff;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        header img { width: 110px; height: auto; }
        
        /* 메인 비주얼 배너 디테일 */
        .main-banner {
            margin: 25px auto;
            max-width: 440px;
            height: 220px;
            background: #ddd url('image_388bc1.png') center/cover no-repeat;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            position: relative;
        }
        .banner-overlay {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
        }
        .banner-text p { margin: 0; font-size: 11px; font-weight: 600; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
        .banner-text h3 { margin: 8px 0 0; font-size: 22px; color: #fff; font-weight: 800; letter-spacing: -0.5px; }

        .container {
            max-width: 500px; margin: 0 auto; padding: 10px 20px 100px;
            display: flex; flex-direction: column; gap: 24px;
        }

        /* 카드 레이아웃 세분화 */
        .card {
            background: #fff; border-radius: 30px; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .card:active { transform: scale(0.98); }

        .card-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 24px 18px; text-decoration: none; color: inherit;
        }
        .card-top h2 { font-size: 1.15rem; margin: 0; font-weight: 800; color: #222; }
        .card-top span { font-size: 11px; font-weight: 700; opacity: 0.7; }
        
        /* 섹션별 포인트 사이드바 */
        .card.outer { border-left: 10px solid var(--point-blue); }
        .card.tops { border-left: 10px solid var(--soft-pink); }
        .card.bottoms { border-left: 10px solid var(--soft-green); }
        .card.acc { border-left: 10px solid var(--soft-purple); }

        .sub-wrap {
            padding: 0 24px 24px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start;
        }
        .chip {
            text-decoration: none; font-size: 11.5px; color: #666;
            background: #f8f8f8; padding: 9px 16px; border-radius: 14px;
            font-weight: 600; border: 1px solid #eee;
            transition: 0.2s;
        }
        .chip:active { background: #fff; border-color: var(--point-blue); color: var(--point-blue); }

        /* 하단 2열 그리드 세련되게 조정 */
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .grid-card {
            padding: 35px 20px; text-align: center; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .grid-card h2 { font-size: 1.1rem; margin: 0; font-weight: 800; }
        .grid-card span { font-size: 10px; font-weight: 600; color: rgba(0,0,0,0.3); }

        footer { text-align: center; padding: 60px 20px; font-size: 10px; color: #bbb; letter-spacing: 1px; }
    </style>
</head>
