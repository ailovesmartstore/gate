<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 키즈리버</title>
    <style>
        :root {
            --bg-color: #fcfcf9;
            --main-blue: #7ba8d2;
            --card-shadow: rgba(0,0,0,0.08);
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg-color); 
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }

        header { padding: 40px 0 20px; text-align: center; }
        header img { width: 180px; height: auto; display: block; margin: 0 auto 15px; }

        .brand-intro { padding: 0 20px; text-align: center; margin-bottom: 20px; }
        .brand-intro h1 { font-size: 14px; font-weight: 800; color: #444; letter-spacing: 1px; margin: 0; }
        .brand-intro p { margin-top: 6px; font-size: 10px; color: #aaa; }

        .container {
            max-width: 500px; margin: 0 auto; padding: 0 16px 100px;
            display: flex; flex-direction: column; gap: 14px;
        }

        /* 카드 공통 스타일 */
        .card {
            position: relative;
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 12px var(--card-shadow);
            cursor: pointer;
            min-height: 120px;
        }

        /* 이미지 부재 시 대비한 기본 그라데이션 */
        .card::after {
            content: '';
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }

        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.12); }

        .big-card-top {
            position: relative; z-index: 2;
            padding: 25px 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
            color: #fff;
        }
        .big-card-top h2 { font-size: 1.2rem; margin: 0; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .big-card-top .view-all { font-size: 10px; opacity: 0.9; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 10px; backdrop-filter: blur(5px); }
        
        .sub-wrap {
            position: relative; z-index: 3;
            padding: 0 20px 25px; display: flex; flex-wrap: wrap; gap: 8px;
        }
        
        .chip {
            text-decoration: none; font-size: 11px; color: #fff;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 14px; border-radius: 12px;
            font-weight: 600; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .chip:hover { background: #fff; color: #333; }

        /* 실시간 재고 전용 스타일 */
        .bg-stock { background: var(--main-blue); min-height: 80px; justify-content: center; }
        .bg-stock::after { display: none; }

        /* 하프 그리드 */
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .half-card { height: 140px; justify-content: center; align-items: center; text-align: center; }
        .half-card h2 { position: relative; z-index: 2; color: #fff; font-size: 1.1rem; font-weight: 800; }

        /* 배경 이미지 (경로 확인 필요) */
        .outer { background-color: #a5b1c2; background-image: url('outer.jpg'); }
        .tops { background-color: #d1d8e0; background-image: url('tee.jpg'); }
        .bottoms { background-color: #778ca3; background-image: url('pants.jpg'); }
        .acc { background-color: #4b6584; background-image: url('acc.jpg'); }
        .dress { background-color: #a55eea; background-image: url('onepiece.jpg'); }
        .setup { background-color: #20bf6b; background-image: url('set.jpg'); }

        footer { text-align: center; padding: 40px 20px; font-size: 10px; color: #ccc; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <!-- 로고 이미지가 없다면 텍스트로 대체될 수 있도록 alt를 정확히 기입 -->

    <div class="brand-intro">

        <p>20,000여 가지 아동복 실시간 업데이트</p>
    </div>
</header>

<div class="container">

            <h2 style="font-size: 1.1rem;">실시간 재고보유 ✨</h2>
            <span class="view-all">전체보기 ></span>
        </div>
    </div>

    <!-- 아우터 -->

        </div>
        <div class="sub-wrap" onclick="event.stopPropagation();">

            <a href="outer_jacket.html" class="chip">자켓/코트</a>

    <!-- 상의 -->

        <div class="sub-wrap" onclick="event.stopPropagation();">
            <a href="tops_tshirts.html" class="chip">티&맨투맨&후드</a>
            <a href="tops_knit.html" class="chip">조끼&니트</a>
            <a href="tops_shirts.html" class="chip">셔츠&블라우스</a>

    <!-- 하의 -->
    <div class="card bottoms" onclick="location.href='bottoms_all.html'">

            <span class="view-all">전체보기 ></span>
        </div>
        <div class="sub-wrap" onclick="event.stopPropagation();">
            <a href="bottoms_jeans.html" class="chip">청바지</a>
            <a href="bottoms_pants.html" class="chip">기본바지</a>
            <a href="bottoms_skirt.html" class="chip">스커트</a>
            <a href="bottoms_leggings.html" class="chip">레깅스</a>
        </div>
    </div>

    <!-- 악세사리 -->
    <div class="card acc" onclick="location.href='acc_all.html'">
        <div class="big-card-top">
            <h2>악세사리</h2>
            <span class="view-all">전체보기 ></span>
        </div>
        <div class="sub-wrap" onclick="event.stopPropagation();">
            <a href="acc_socks.html" class="chip">양말</a>
            <a href="acc_shoes.html" class="chip">신발</a>
            <a href="acc_hat.html" class="chip">모자</a>
            <a href="acc_bag.html" class="chip">가방</a>
        </div>
    </div>

    <!-- 원피스 & 상하복 그리드 -->
    <div class="grid-half">
        <div class="card dress half-card" onclick="location.href='dress_all.html'">
            <h2>원피스</h2>
        </div>
        <div class="card setup half-card" onclick="location.href='setup_all.html'">
            <h2>상하복</h2>
        </div>
    </div>
</div>

<footer>© KIDS RIVER</footer>

</body>
</html>
