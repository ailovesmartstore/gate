<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER</title>
    <style>
        /* 1. 디자인 베이스: 미니멀 & 화이트 */
        :root { --main-bg: #ffffff; --sub-bg: #fdfdfd; --point-color: #111; --text-light: #888; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--main-bg); color: var(--point-color); -webkit-tap-highlight-color: transparent; }

        /* 2. 헤더: 감성적인 로고 타입 */
        .header { padding: 30px 20px 10px; text-align: center; font-size: 22px; font-weight: 200; letter-spacing: 4px; color: #000; }
        .sub-header { text-align: center; font-size: 10px; color: var(--text-light); letter-spacing: 2px; margin-bottom: 30px; }

        /* 3. 카테고리: 얇고 세련된 라인 */
        .nav-tabs { display: flex; gap: 20px; padding: 0 20px 15px; overflow-x: auto; position: sticky; top: 0; background: #fff; z-index: 100; scrollbar-width: none; border-bottom: 1px solid #f0f0f0; }
        .nav-tabs::-webkit-scrollbar { display: none; }
        .tab { white-space: nowrap; font-size: 13px; font-weight: 300; color: #aaa; cursor: pointer; padding-bottom: 5px; transition: 0.3s; }
        .tab.active { color: #000; font-weight: 600; border-bottom: 2px solid #000; }

        /* 4. 상품 리스트: 여백을 강조한 카드 */
        .section-title { padding: 25px 20px 15px; font-size: 14px; font-weight: 600; letter-spacing: -0.5px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px 150px; }
        .p-card { background: #fff; cursor: pointer; }
        .p-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; filter: brightness(0.98); }
        .p-info { padding: 12px 0; }
        .p-name { font-size: 12px; font-weight: 400; margin-bottom: 6px; color: #333; }
        .p-price { font-size: 13px; font-weight: 700; }

        /* 5. 상세 모달 (깔끔한 슬라이드 업 느낌) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; overflow-y: auto; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #modal-img { width: 100%; display: block; }
        .back-btn { position: fixed; top: 20px; left: 20px; width: 30px; height: 30px; z-index: 10001; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* 6. 하단 구매 바: 플로팅 디자인 */
        .bottom-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(255,255,255,0.98); border-radius: 15px; z-index: 20000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; backdrop-filter: blur(10px); }
        .opt-container { padding: 20px; }
        .fixed-name { font-size: 13px; font-weight: 600; margin-bottom: 15px; color: #111; text-align: center; }
        .sel-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .sel-row select { flex: 1; padding: 12px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 13px; background: #fff; outline: none; }
        .buy-btn { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 500; font-size: 14px; cursor: pointer; }

        /* 7. 장바구니: 미니멀한 팝업 */
        #cart-pop { position: fixed; bottom: 120px; right: 20px; width: 260px; background: #fff; border-radius: 12px; z-index: 30000; display: none; box-shadow: 0 15px 40px rgba(0,0,0,0.15); padding: 20px; border: 1px solid #eee; }
        .cart-item { padding: 15px 0; border-bottom: 1px solid #f9f9f9; }
        .copy-box { margin-top: 12px; display: flex; gap: 8px; }
        .c-btn { flex: 1; padding: 10px; font-size: 11px; text-align: center; border-radius: 5px; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .c-btn.black { background: #111; color: #fff; }
        .c-btn.green { background: #00c73c; color: #fff; }
    </style>
</head>
<body>

    <div class="header">KIDS RIVER</div>
    <div class="sub-header">SELECTIVE CHILDREN'S WEAR</div>

    <div class="nav-tabs">
        <div class="tab active" onclick="filterCategory('전체')">ALL</div>
        <div class="tab" onclick="filterCategory('당일배송')">FAST DELIVERY</div>
        <div class="tab" onclick="filterCategory('상하복')">SET-UP</div>
        <div class="tab" onclick="filterCategory('티셔츠')">TOPS</div>
        <div class="tab" onclick="filterCategory('팬츠')">BOTTOMS</div>
        <div class="tab" onclick="filterCategory('테스트')">TEST</div>
    </div>

    <div class="section-title" id="sec-title">NEW ARRIVALS</div>
    <div class="product-grid" id="main-grid"></div>

    <!-- 상세페이지 모달 -->
    <div id="modal">
        <div class="back-btn" onclick="closeModal()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <img id="modal-img" src="">
        <div style="padding: 60px 20px; text-align: center;">
            <p style="font-size: 11px; color: #bbb; letter-spacing: 1px;">KIDS RIVER QUALITY ASSURED</p>
        </div>
    </div>

    <!-- 하단 플로팅 옵션바 -->
    <div class="bottom-bar" id="bottom-bar">
        <div class="opt-container">
            <div class="fixed-name" id="target-name"></div>
            <div class="sel-row">
                <select id="c-select"><option value="">COLOR</option></select>
                <select id="s-select"><option value="">SIZE</option></select>
            </div>
            <button class="buy-btn" onclick="addCart()">ADD TO CART</button>
        </div>
    </div>

    <!-- 장바구니 팝업 -->
    <div id="cart-pop">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <strong style="font-size:14px; letter-spacing: 1px;">CART</strong>
            <span onclick="this.parentElement.parentElement.style.display='none'" style="cursor:pointer; color:#ccc;">✕</span>
        </div>
        <div id="cart-content" style="max-height: 250px; overflow-y: auto;"></div>
    </div>

    <script>
        const products = [
            ["[상하] 566번 스타티", "그린,크림", "5,7,9,11", "566", "스토어주소1", "19,800", "상하복"],
            ["[티] 565번 단가라", "블루,옐로우", "5,7,9,11", "565", "스토어주소2", "12,500", "티셔츠"],
            ["[테스트] 000번 샘플", "화이트,블랙", "FREE", "564", "스토어주소3", "10,000", "테스트"]
        ];

        let cart = [];
        let activeProduct = null;

        function renderGrid(data) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map(p => `
                <div class="p-card" onclick="openDetail('${p[3]}')">
                    <img src="https://mododome.diskn.com/gilgil/2026/4M/14/600600/4M14D${p[3]}.jpg">
                    <div class="p-info">
                        <div class="p-name">${p[0]}</div>
                        <div class="p-price">${p[5]}원</div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(cat) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('sec-title').innerText = cat === '전체' ? 'NEW ARRIVALS' : cat.toUpperCase();
            renderGrid(cat === '전체' ? products : products.filter(p => p[6] === cat));
        }

        function openDetail(code) {
            activeProduct = products.find(p => p[3] === code);
            document.getElementById('modal-img').src = `https://mododome.diskn.com/gilgil/2026/4M/14/page14/4M14D${code}.jpg`;
            document.getElementById('target-name').innerText = activeProduct[0];
            
            const cs = document.getElementById('c-select');
            const ss = document.getElementById('s-select');
            cs.innerHTML = '<option value="">COLOR</option>';
            ss.innerHTML = '<option value="">SIZE</option>';
            activeProduct[1].split(',').forEach(v => cs.innerHTML += `<option value="${v.trim()}">${v.trim()}</option>`);
            activeProduct[2].split(',').forEach(v => ss.innerHTML += `<option value="${v.trim()}">${v.trim()}</option>`);

            document.getElementById('modal').style.display = 'block';
            document.getElementById('bottom-bar').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function addCart() {
            const c = document.getElementById('c-select').value;
            const s = document.getElementById('s-select').value;
            if(!c || !s) return alert("Please select option.");

            const combined = `${activeProduct[0]}/${c}/${s}`;
            cart.push({ text: combined, link: activeProduct[4] });
            showCart();
        }

        function showCart() {
            const pop = document.getElementById('cart-pop');
            const content = document.getElementById('cart-content');
            pop.style.display = 'block';
            content.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <div style="font-size:11px; font-weight:500;">${i.text}</div>
                    <div class="copy-box">
                        <div class="c-btn black" onclick="copy('${i.text}')">COPY</div>
                        <a href="${i.link}" target="_blank" class="c-btn green">ORDER</a>
                    </div>
                </div>
            `).reverse().join('');
        }

        function copy(t) {
            navigator.clipboard.writeText(t).then(() => alert("Copied!"));
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('bottom-bar').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        renderGrid(products);
    </script>
</body>
</html>
