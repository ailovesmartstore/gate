<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 키즈리버</title>
    <style>
        :root {
            --bg-color: #fcfcf9;
            --main-blue: #7ba8d2;
            --bebe-pink: #f4dada;
            --pajama-peach: #ffedda;
            --card-shadow: rgba(0,0,0,0.08);
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg-color); 
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }

        header { 
            width: 100%;
            background: #fff;
            padding-bottom: 20px;
        }
        header .logo-container {
            width: 100%;
            overflow: hidden;
        }
        header img { 
            width: 100%; 
            height: auto; 
            display: block;
        }

        .brand-intro { padding: 20px; text-align: center; }
        .brand-intro h1 { font-size: 16px; font-weight: 800; color: #444; letter-spacing: 1px; margin: 0; }
        .brand-intro p { margin-top: 6px; font-size: 11px; color: #aaa; }

        .container {
            max-width: 600px; 
            margin: 0 auto; padding: 0 16px 100px;
            display: flex; flex-direction: column; gap: 16px;
        }

        .card {
            position: relative;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 12px var(--card-shadow);
            cursor: pointer;
            min-height: 140px;
        }

        .card::after {
            content: '';
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.3); 
            z-index: 1;
            transition: background 0.3s ease;
        }

        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 12px 30px rgba(0,0,0,0.15); 
        }
        .card:hover::after {
            background: rgba(0,0,0,0.1); 
        }

        .big-card-top {
            position: relative; z-index: 2;
            padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center;
            color: #fff;
        }
        .big-card-top h2 { font-size: 1.1rem; margin: 0; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .big-card-top .view-all { font-size: 10px; font-weight: 600; background: rgba(255,255,255,0.25); padding: 4px 10px; border-radius: 20px; backdrop-filter: blur(5px); }
        
        .sub-wrap {
            position: relative; z-index: 3;
            padding: 0 20px 30px; display: flex; flex-wrap: wrap; gap: 8px;
            margin-top: -15px;
        }
        
        .chip {
            text-decoration: none; font-size: 12px; color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px; border-radius: 12px;
            font-weight: 600; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
        }
        .chip:hover { background: #fff; color: #333; transform: scale(1.05); }

        /* 배경 및 특수 섹션 */
        .bg-stock { background: var(--main-blue); min-height: 90px; justify-content: center; }
        .bg-stock::after { background: rgba(0,0,0,0.05); }
        .bg-stock:hover::after { background: rgba(0,0,0,0); }

        .bg-bebe { background-color: var(--bebe-pink); background-image: url('images/bebe.jpg'); }
        .outer { background-color: #a5b1c2; background-image: url('images/outer.jpg'); }
        .tops { background-color: #d1d8e0; background-image: url('images/tee.jpg'); }
        .bottoms { background-color: #778ca3; background-image: url('images/pants.jpg'); }
        .acc { background-color: #4b6584; background-image: url('images/acc.jpg'); }
        
        /* 3열 그리드 섹션 */
        .grid-triple { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
        }
        .small-card { min-height: 120px; }
        .small-card .big-card-top { 
            flex-direction: column; 
            justify-content: center; 
            gap: 8px; 
            height: 100%; 
            padding: 10px; 
            text-align: center; 
        }
        .small-card h2 { font-size: 0.95rem; }

        .bg-pajama { background-color: var(--pajama-peach); background-image: url('images/pajama.jpg'); }
        .dress { background-color: #a55eea; background-image: url('images/onepiece.jpg'); }
        .setup { background-color: #20bf6b; background-image: url('images/set.jpg'); }

        footer { text-align: center; padding: 60px 20px; font-size: 11px; color: #bbb; letter-spacing: 2px; }
    </style>
</head>
