<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER</title>
    <style>
        :root {
            --point-blue: #7ba8d2;
            --soft-bg: #f8f7f4;
            --card-white: #ffffff;
            --text-main: #2d2d2d;
            --text-sub: #8e8e8e;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background: var(--soft-bg); 
            color: var(--text-main);
            line-height: 1.6;
        }

        /* 헤더: 로고 강조 */
        header { padding: 60px 20px 40px; text-align: center; }
        header img { width: 160px; height: auto; margin-bottom: 15px; }
        header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        header p { font-size: 0.7rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 18px 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 섹션 카드 공통 */
        .section-card {
            background: var(--card-white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* 전체보기 영역 */
        .all-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 22px;
            text-decoration: none;
            color: var(--text-main);
            transition: background 0.3s;
        }
        .all-link:active { background: #fcfcfc; }
        .all-link .title-group h2 { font-size: 1.1rem; margin: 0; font-weight: 700; }
        .all-link .title-group span { font-size: 0.75rem; color: var(--point-blue); font-weight: 600; }
        .all-link .arrow { font-size: 1.2rem; color: #ddd; }

        /* 소분류 영역: 칩(Chip) 스타일 디자인 */
        .sub-group {
            padding: 0 20px 22px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .sub-btn {
            text-decoration: none;
            font-size: 11px;
            color: #666;
            background: #f1f3f5;
            padding: 7px 14px;
            border-radius: 100px; /* 완전 둥근 형태 */
            transition: all 0.2s;
            font-weight: 500;
        }
        .sub-btn:active { background: var(--point-blue); color: #fff; }

        /* 재고보유: 독보적 강조 */
        .stock-card {
            background: linear-gradient(135deg, #7ba8d2 0%, #a3c4e5 100%);
            border: none;
        }
        .stock-card .all-link { color: #fff; }
        .stock-card .title-group span { color: rgba(255,255,255,0.8); }
        .stock-card .arrow { color: rgba(255,255,255,0.5); }

        footer { text-align: center; padding-bottom: 40px; font-size: 10px; color: #bbb; letter-spacing: 1px; }

        /* 애니메이션 */
        .section-card { animation: fadeInUp 0.6s ease forwards; opacity: 0; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="KIDS RIVER">
    <h1>오늘도 빛나는 우리 아이</h1>
    <p>Premium Kids Wear Collection</p>
</header>

<div class="container">
    <!-- 재고보유 -->
    <div class="section-card stock-card" style="animation-delay: 0.1s;">
        <a href="stock_list.html" class="all-link">
            <div class="title-group">
                <h2>실시간 재고보유</h2>
                <span>지금 바로 배송 가능한 상품</span>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>

    <!-- 아우터 -->
    <div class="section-card" style="animation-delay: 0.2s;">
        <a href="outer_all.html" class="all-link">
            <div class="title-group">

            </div>
            <div class="arrow">→</div>
        </a>
        <div class="sub-group">
            <a href="#" class="sub-btn">가디건</a>

    </div>

    <!-- 상의 -->
    <div class="section-card" style="animation-delay: 0.3s;">

        <div class="sub-group">
            <a href="#" class="sub-btn">티&맨투맨&후드</a>
            <a href="#" class="sub-btn">조끼&니트</a>
            <a href="#" class="sub-btn">셔츠&블라우스</a>
        </div>
    </div>

    <!-- 하의 -->
    <div class="section-card" style="animation-delay: 0.4s;">
        <a href="bottoms_all.html" class="all-link">
            <div class="title-group">
                <h2>하의</h2>
                <span>전체보기</span>
            </div>
            <div class="arrow">→</div>
        </a>
        <div class="sub-group">
            <a href="#" class="sub-btn">청바지</a>
            <a href="#" class="sub-btn">스커트</a>
            <a href="#" class="sub-btn">레깅스</a>
            <a href="#" class="sub-btn">기본바지</a>
        </div>
    </div>

    <!-- 악세사리 -->
    <div class="section-card" style="animation-delay: 0.5s;">
        <a href="acc_all.html" class="all-link">
            <div class="title-group">
                <h2>악세사리</h2>
                <span>전체보기</span>
            </div>
            <div class="arrow">→</div>
        </a>
        <div class="sub-group">
            <a href="#" class="sub-btn">양말</a>
            <a href="#" class="sub-btn">장갑&목도리</a>
            <a href="#" class="sub-btn">가방</a>
            <a href="#" class="sub-btn">헤어 액세서리</a>
            <a href="#" class="sub-btn">신발</a>
            <a href="#" class="sub-btn">모자</a>
        </div>
    </div>

    <!-- 기타 단일 카테고리 -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="section-card" style="animation-delay: 0.6s;">
            <a href="#" class="all-link" style="padding: 30px 20px;">
                <div class="title-group"><h2>원피스</h2><span>GO</span></div>
            </a>
        </div>
        <div class="section-card" style="animation-delay: 0.6s;">
            <a href="#" class="all-link" style="padding: 30px 20px;">
                <div class="title-group"><h2>상하복</h2><span>GO</span></div>
            </a>
        </div>
        <div class="section-card" style="animation-delay: 0.7s;">
            <a href="#" class="all-link" style="padding: 30px 20px;">
                <div class="title-group"><h2>파자마</h2><span>GO</span></div>
            </a>
        </div>
        <div class="section-card" style="animation-delay: 0.7s;">
            <a href="#" class="all-link" style="padding: 30px 20px;">
                <div class="title-group"><h2>신생아</h2><span>GO</span></div>
            </a>
        </div>
    </div>
</div>

<footer>© KIDS RIVER</footer>

</body>
</html>
