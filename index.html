<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 키즈리버</title>
    <style>
        :root {
            --point-blue: #7ba8d2;
            --bg-color: #fcfcf9; 
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg-color); 
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }

        header { 
            padding: 40px 0 20px; 
            text-align: center;
        }

        /* 로고를 화면 가득 시원하게 배치 */
        header img { 
            width: 100%;
            max-width: 500px;
            height: auto; 
            display: block;
            margin: 0 auto;
        }

        .brand-intro { 
            margin-top: -15px;
            padding: 0 20px; 
            opacity: 0.5;
        }
        .brand-intro h1 { font-size: 13px; font-weight: 700; color: #444; letter-spacing: 1px; }
        .brand-intro p { margin-top: 4px; font-size: 10px; color: #888; }

        .container {
            max-width: 500px; margin: 0 auto; padding: 10px 16px 100px;
            display: flex; flex-direction: column; gap: 14px;
        }

        .card {
            position: relative;
            background-color: #eee;
            background-size: cover;
            background-position: center;
            border-radius: 22px;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: none;
        }

        /* 이미지 위 가독성을 위한 그라데이션 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 70%);
            z-index: 1;
        }

        .card:active { transform: scale(0.96); }

        .card-top {
            position: relative; z-index: 2;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px 8px;
            text-decoration: none; color: #fff;
        }
        .card-top h2 { font-size: 1.1rem; margin: 0; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .card-top span { font-size: 10px; font-weight: 600; opacity: 0.8; }
        
        .sub-wrap {
            position: relative; z-index: 2;
            padding: 0 20px 15px; display: flex; flex-wrap: wrap; gap: 6px;
        }
        .chip {
            text-decoration: none; font-size: 10.5px; color: #fff;
            background: rgba(255,255,255,0.15);
            padding: 6px 12px; border-radius: 12px;
            font-weight: 600; 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* [임의 설정된 아동복 이미지 주소] */
        /* 아우터: 베이지 톤의 따뜻한 느낌 */
        .card.outer { background-image: url('https://images.unsplash.com/photo-1544126592-807daa2b567b?auto=format&fit=crop&q=80&w=500'); }
        
        /* 상의: 깔끔한 니트/티셔츠 스타일 */
        .card.tops { background-image: url('https://images.unsplash.com/photo-1519235106638-30cc49b4f42b?auto=format&fit=crop&q=80&w=500'); }
        
        /* 하의: 활동적인 느낌의 키즈 팬츠 */
        .card.bottoms { background-image: url('https://images.unsplash.com/photo-1622244099803-753184483adc?auto=format&fit=crop&q=80&w=500'); }
        
        /* 악세사리: 소품 위주의 감성컷 */
        .card.acc { background-image: url('https://images.unsplash.com/photo-1522771935876-2497116534a8?auto=format&fit=crop&q=80&w=500'); }

        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* 원피스: 화사한 분위기 */
        .card.dress { background-image: url('https://images.unsplash.com/photo-1518831959646-742c3a14ebf7?auto=format&fit=crop&q=80&w=500'); min-height: 100px; }
        
        /* 상하복: 편안한 홈웨어/세트 느낌 */
        .card.setup { background-image: url('https://images.unsplash.com/photo-1503919919749-646dd4100613?auto=format&fit=crop&q=80&w=500'); min-height: 100px; }

        .grid-card {
            padding: 25px 15px; text-align: center; text-decoration: none; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .grid-card h2 { font-size: 1rem; margin: 0; font-weight: 800; z-index: 2; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        footer { text-align: center; padding: 50px 20px; font-size: 10px; color: #ccc; letter-spacing: 2px; }
    </style>
</head>

</html>
