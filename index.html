<style>
  body { margin:0; font-family: 'Apple SD Gothic Neo', sans-serif; text-align:center; background:#f8f9fa; color:#333; }
  .header { padding: 40px 20px; background: #fff; border-bottom: 1px solid #eee; margin-bottom: 20px; }
  .header p { color: #888; font-size: 14px; margin-top: 8px; }

  .gate-container { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 650px; margin: 0 auto; }
  
  /* 큰 분류 박스 */
  .category-box {
    background: #fff; border: 1px solid #eaeaea; padding: 20px 10px;
    border-radius: 15px; display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  
  .icon-main { font-size: 30px; margin-bottom: 8px; }
  .title-main { font-size: 17px; font-weight: bold; color: #222; margin-bottom: 12px; }
  
  /* 소분류 텍스트 링크 스타일 */
  .sub-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; border-top: 1px dashed #eee; pt: 10px; margin-top: 5px; padding-top: 10px; }
  .sub-links a {
    text-decoration: none; color: #666; font-size: 12px; font-weight: 500;
    padding: 2px 4px; transition: 0.2s;
  }
  .sub-links a:hover { color: #339af0; text-decoration: underline; }
  .sub-links a:after { content: "|"; color: #eee; margin-left: 8px; }
  .sub-links a:last-child:after { content: ""; }

  .full { grid-column: span 2; background: #fff9db; border-color: #ffec99; }
  .acc { grid-column: span 2; background: #f3f0ff; border-color: #e5dbff; }
</style>
