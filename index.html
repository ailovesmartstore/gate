<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIDS RIVER Archive</title>
    <style>
        body { margin:0; font-family: 'Apple SD Gothic Neo', sans-serif; text-align:center; background:#f8f9fa; color:#333; line-height: 1.5; }
        .header { padding: 45px 20px 25px; background: #fff; border-bottom: 1px solid #eee; }
        .header img { width: 100%; max-width: 200px; height: auto; }
        .header p { color: #888; font-size: 14px; margin-top: 10px; font-weight: 500; }

        .gate-container { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 650px; margin: 0 auto; }
        
        .category-box { background: #fff; border: 1px solid #eaeaea; padding: 25px 12px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .icon-main { font-size: 38px; margin-bottom: 12px; }
        .title-main { font-size: 17px; font-weight: bold; color: #222; margin-bottom: 15px; }
        .sub-links { display: flex; flex-direction: column; width: 100%; gap: 6px; border-top: 1px solid #f1f3f5; padding-top: 15px; }
        .sub-links a { text-decoration: none; color: #666; font-size: 13px; font-weight: 500; padding: 12px 5px; border-radius: 10px; background: #fcfcfc; border: 1px solid #f1f3f5; transition: 0.2s; }
        .sub-links a.all-view { background: #f1f8ff; color: #007bff; border-color: #e1f0ff; font-weight: 700; }

        .full { grid-column: span 2; background: #fffceb; border-color: #ffec99; padding: 35px 15px; }
        /* 테스트 섹션 디자인 */
        .test-box { grid-column: span 2; border: 2px solid #339af0; background: #e7f5ff; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="KIDS RIVER">
        <p>20,000+ 아이옷 통합 카탈로그</p>
    </div>

    <div class="gate-container">
        <!-- 재고보유 -->
        <div class="category-box full">
            <div class="icon-main">📦</div>
            <div class="title-main">재고 보유 상품</div>
            <div class="sub-links">
                <a href="stock.html" class="all-view">입고 완료 상품 확인</a>
            </div>
        </div>

        <!-- [연결 수정됨] 테스트 섹션 -->
        <div class="category-box test-box">
            <div class="icon-main">🛠️</div>
            <div class="title-main">테스트 섹션</div>
            <p style="font-size: 11px; color: #666; margin-bottom: 10px;">이미지 위 정보 표시 스타일 확인</p>
            <div class="sub-links">
                <!-- href 부분을 "test.html"로 정확히 맞췄습니다 -->
                <a href="test.html" style="background: #339af0; color: #fff; border: none; font-weight: bold;">지금 확인하기</a>
            </div>
        </div>

        <!-- 기타 카테고리 -->
        <div class="category-box">
            <div class="icon-main">👕</div><div class="title-main">상하복</div>
            <div class="sub-links"><a href="set.html" class="all-view">전체 보기</a></div>
        </div>
        <div class="category-box">
            <div class="icon-main">👗</div><div class="title-main">원피스</div>
            <div class="sub-links"><a href="onepiece.html" class="all-view">전체 보기</a></div>
        </div>
    </div>

</body>
</html>
