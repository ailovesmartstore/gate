<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #fff; text-align: center; }
        
        /* [1] 상단 대표 이미지: logo.png 사용 */
        .logo-area { padding: 50px 20px 30px; }
        .logo-area img { width: 150px; height: auto; }

        /* [2] 메인 타이틀 */
        .intro-text { margin-bottom: 40px; }
        .intro-text h1 { font-size: 18px; font-weight: 800; color: #333; margin: 0; }
        .intro-text p { font-size: 12px; color: #999; margin-top: 5px; }

        /* [3] 사각형 틀 형식의 아기자기한 메뉴 (이미지 없음) */
        .grid-menu { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 0 25px; 
        }
        
        .menu-item { 
            border: 1px solid #eee; 
            border-radius: 12px; 
            padding: 30px 10px; 
            background: #fafafa;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 대분류 & 소분류 텍스트 스타일 */
        .main-cat { font-size: 15px; font-weight: 700; color: #444; margin-bottom: 6px; }
        .sub-cat { font-size: 10px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }

        /* 하단 카피라이트 */
        .footer { margin-top: 60px; font-size: 10px; color: #ddd; padding-bottom: 30px; }
    </style>
</head>
<body>

    <div class="logo-area">
        <img src="logo.png" alt="KIDS RIVER">
    </div>

    <div class="intro-text">
        <h1>20,000+ 아이옷 통합 카탈로그</h1>
        <p>SELECTIVE CHILDREN'S WEAR</p>
    </div>

    <div class="grid-menu">
        <!-- 사각형 틀 안에 대분류와 소분류만 깔끔하게 -->
        <a href="#" class="menu-item">
            <span class="main-cat">상하복</span>
            <span class="sub-cat">Set-up</span>
        </a>
        <a href="#" class="menu-item">
            <span class="main-cat">티셔츠</span>
            <span class="sub-cat">T-shirts</span>
        </a>
        <a href="#" class="menu-item">
            <span class="main-cat">팬츠</span>
            <span class="sub-cat">Pants</span>
        </a>
        <a href="#" class="menu-item">
            <span class="main-cat">재고보유</span>
            <span class="sub-cat">In Stock</span>
        </a>
        <!-- 필요하신 만큼 박스를 추가하세요 -->
    </div>

    <div class="footer">© KIDS RIVER</div>

</body>
</html>
