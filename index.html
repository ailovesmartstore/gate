<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER - 키즈리버</title>
    <style>
        :root {
            --bg-color: #fcfcf9;
            --color-outer: #d1d8e0;
            --color-tops: #e2d1c3;
            --color-bottoms: #dcdde1;
            --color-acc: #f5f6fa;
            --color-dress: #f1f2f6;
            --color-setup: #dfe4ea;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg-color); 
            color: #333;
            -webkit-tap-highlight-color: transparent;
        }

        header { 
            padding: 30px 0 10px; 
            text-align: center;
        }
        header img { 
            width: 100%;
            max-width: 480px; 
            height: auto; 
            display: block;
            margin: 0 auto;
        }

        .brand-intro { 
            margin-top: -10px;
            padding: 0 20px; 
            opacity: 0.4;
        }
        .brand-intro h1 { font-size: 12px; font-weight: 700; color: #444; letter-spacing: 1px; }
        .brand-intro p { margin-top: 4px; font-size: 9px; color: #888; }

        .container {
            max-width: 500px; margin: 0 auto; padding: 10px 16px 80px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .card {
            position: relative;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.1s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0) 65%);
            z-index: 1;
        }

        .card:active { transform: scale(0.97); }

        .big-card-top {
            position: relative; z-index: 2;
            padding: 30px 20px 10px;
            text-decoration: none; color: #fff;
            display: flex; justify-content: space-between; align-items: center;
        }
        .big-card-top h2 { font-size: 1.15rem; margin: 0; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .big-card-top span { font-size: 10px; opacity: 0.9; font-weight: 600; }
        
        .sub-wrap {
            position: relative; z-index: 2;
            padding: 0 20px 25px; display: flex; flex-wrap: wrap; gap: 6px;
        }
        .chip {
            text-decoration: none; font-size: 10px; color: #fff;
            background: rgba(255,255,255,0.22);
            padding: 6px 12px; border-radius: 12px;
            font-weight: 600; backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .center-card {
            height: 110px;
            text-decoration: none;
            display: flex;
            align-items: center;    
            justify-content: center; 
            position: relative;
            z-index: 2;
            color: #fff;
            text-align: center;
        }
        .center-card h2 { font-size: 1.05rem; margin: 0; font-weight: 800; text-shadow: 0 2px 5px rgba(0,0,0,0.4); }

        /* 배경 이미지 설정 - 깃허브 파일명 매칭 */
        .bg-stock { background: linear-gradient(135deg, #7ba8d2 0%, #9bc1e5 100%); }
        .card.outer { background-color: var(--color-outer); background-image: url('outer.jpg'); }
        .card.tops { background-color: var(--color-tops); background-image: url('tee.jpg'); } /* tee.jpg 매칭 */
        .card.bottoms { background-color: var(--color-bottoms); background-image: url('pants.jpg'); } /* pants.jpg 매칭 */
        .card.acc { background-color: var(--color-acc); background-image: url('acc.jpg'); }
        .card.dress { background-color: var(--color-dress); background-image: url('onepiece.jpg'); } /* onepiece.jpg 매칭 */
        .card.setup { background-color: var(--color-setup); background-image: url('set.jpg'); } /* set.jpg 매칭 */

        footer { text-align: center; padding: 40px 20px; font-size: 10px; color: #ccc; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>

    <div class="card outer">

    <div class="card bottoms">

        </a>
        <div class="sub-wrap">

            <a href="bottoms_leggings.html" class="chip">레깅스</a>
            <a href="bottoms_pants.html" class="chip">기본바지</a>

    </div>

    <div class="card acc">

        </a>
        <div class="sub-wrap">

            <a href="acc_hat.html" class="chip">모자</a>
        </div>
    </div>

    <div class="grid-half">
        <div class="card dress">
            <a href="dress_all.html" class="center-card">
                <h2>원피스</h2>
            </a>
        </div>
        <div class="card setup">
            <a href="setup_all.html" class="center-card">
                <h2>상하복</h2>
            </a>
        </div>
    </div>
</div>

<footer>© KIDS RIVER</footer>

</body>
</html>
