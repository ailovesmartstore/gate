<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIDS RIVER</title>
    <style>
        :root {
            --point-blue: #7ba8d2;
            --soft-pink: #fbe4e4;
            --soft-yellow: #fef5d4;
            --soft-green: #e2f0d9;
            --soft-purple: #ece6f2;
            --bg-color: #f9f9f7;
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Pretendard', sans-serif; 
            background: var(--bg-color); 
            color: #333;
        }

        /* [1] 비주얼 강조 헤더 */
        header { 
            padding: 40px 20px; 
            text-align: center;
            background: #fff;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        header img { width: 120px; margin-bottom: 15px; }
        
        /* 메인 비주얼 배너 (여기에 image_388bc1.png 같은 이미지를 활용하세요) */
        .main-banner {
            margin: 20px auto;
            max-width: 440px;
            height: 180px;
            background: url('image_388bc1.png') center/cover;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .main-banner::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.1);
        }
        .banner-text { position: relative; z-index: 1; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .container {
            max-width: 480px; margin: 0 auto; padding: 20px 18px 80px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* [2] 감성적인 카드 디자인 */
        .card {
            background: #fff; border-radius: 28px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .card:active { transform: scale(0.97); }

        .card-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 22px; text-decoration: none; color: inherit;
        }
        .card-top h2 { font-size: 1.15rem; margin: 0; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        
        /* 섹션별 포인트 컬러링 */
        .card.outer { border-left: 8px solid var(--point-blue); }
        .card.tops { border-left: 8px solid var(--soft-pink); }
        .card.bottoms { border-left: 8px solid var(--soft-green); }

        .sub-wrap {
            padding: 0 20px 25px; display: flex; flex-wrap: wrap; gap: 8px;
        }
        .chip {
            text-decoration: none; font-size: 11px; color: #555;
            background: #f4f4f4; padding: 8px 15px; border-radius: 12px;
            font-weight: 600; border: 1px solid transparent;
        }
        .chip:active { background: #fff; border-color: var(--point-blue); color: var(--point-blue); }

        /* 하단 2열 그리드 */
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        footer { text-align: center; padding: 40px; font-size: 10px; color: #ccc; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="KIDS RIVER">
    <div class="main-banner">
        <div class="banner-text">
            <p style="margin:0; font-size: 12px; font-weight: 300;">2026 SPRING COLLECTION</p>
            <h3 style="margin:5px 0 0; font-size: 20px;">새로운 계절, 우리 아이 첫 옷</h3>
        </div>
    </div>
</header>

<div class="container">
    <!-- 재고보유: 특별한 강조 -->
    <div class="card" style="background: var(--point-blue);">
        <a href="stock_list.html" class="card-top" style="color: #fff;">
            <h2>실시간 재고보유 ✨</h2>
            <span style="font-size: 12px; opacity: 0.8;">VIEW ALL</span>
        </a>
    </div>

    <!-- 아우터 -->
    <div class="card outer">
        <a href="outer_all.html" class="card-top">
            <h2>아우터</h2>
            <span style="color: var(--point-blue); font-weight: 700; font-size: 12px;">전체보기</span>
        </a>
        <div class="sub-wrap">
            <a href="#" class="chip">가디건</a>
        </div>
    </div>

    <!-- 상의 -->
    <div class="card tops">
        <a href="tops_all.html" class="card-top">
            <h2>상의</h2>
            <span style="color: #e08e8e; font-weight: 700; font-size: 12px;">전체보기</span>
        </a>
        <div class="sub-wrap">
            <a href="#" class="chip">티&맨투맨&후드티</a>
            <a href="#" class="chip">조끼&니트&스웨터</a>
            <a href="#" class="chip">셔츠&블라우스</a>
        </div>
    </div>

    <!-- 하의 -->
    <div class="card bottoms">
        <a href="bottoms_all.html" class="card-top">
            <h2>하의</h2>
            <span style="color: #8db57a; font-weight: 700; font-size: 12px;">전체보기</span>
        </a>
        <div class="sub-wrap">
            <a href="#" class="chip">청바지</a>
            <a href="#" class="chip">스커트</a>
            <a href="#" class="chip">레깅스</a>
            <a href="#" class="chip">기본바지</a>
        </div>
    </div>

    <!-- 그리드 배치 -->
    <div class="grid-half">
        <div class="card" style="background: var(--soft-yellow);">
            <a href="#" class="card-top" style="padding: 35px 20px;"><h2>원피스</h2></a>
        </div>
        <div class="card" style="background: var(--soft-purple);">
            <a href="#" class="card-top" style="padding: 35px 20px;"><h2>상하복</h2></a>
        </div>
    </div>
</div>

<footer>© KIDS RIVER</footer>

</body>
</html>
