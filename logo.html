<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids River</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #f5f0e8;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.scene {
  width: 600px;
  height: 380px;
  background: radial-gradient(ellipse at 50% 40%, #fdf8f0 0%, #f0e8d8 100%);
  border-radius: 24px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.08);
}

/* 배경 동그란 빛 */
.glow {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  animation: glowPulse 3s ease-in-out infinite alternate;
}
.glow1 { width:180px; height:180px; top:30px; left:60px; animation-delay:0s; }
.glow2 { width:120px; height:120px; top:80px; right:80px; animation-delay:1s; }
.glow3 { width:80px; height:80px; bottom:80px; left:120px; animation-delay:0.5s; }
@keyframes glowPulse {
  0%   { transform: scale(1); opacity:0.4; }
  100% { transform: scale(1.15); opacity:0.7; }
}

/* 반짝이는 별들 */
.star {
  position: absolute;
  color: #f0b8d0;
  font-size: 14px;
  animation: starTwinkle 2s ease-in-out infinite alternate;
}
.s1 { top:40px; left:80px; animation-delay:0s; font-size:18px; }
.s2 { top:70px; right:100px; animation-delay:0.4s; font-size:12px; }
.s3 { top:120px; left:50px; animation-delay:0.8s; font-size:10px; }
.s4 { bottom:130px; right:70px; animation-delay:0.2s; font-size:16px; }
.s5 { top:50px; left:200px; animation-delay:0.6s; font-size:11px; }
.s6 { bottom:150px; left:160px; animation-delay:1.1s; font-size:13px; }
@keyframes starTwinkle {
  0%   { transform: scale(1) rotate(0deg); opacity:0.4; }
  100% { transform: scale(1.4) rotate(20deg); opacity:1; }
}

/* 작은 하트들 */
.mini-heart {
  position: absolute;
  color: #e8829a;
  animation: heartFloat 4s ease-in-out infinite;
  opacity: 0;
}
.mh1 { font-size:12px; left:420px; bottom:180px; animation-delay:0s; }
.mh2 { font-size:10px; left:440px; bottom:180px; animation-delay:0.8s; }
.mh3 { font-size:14px; left:400px; bottom:180px; animation-delay:1.6s; }
.mh4 { font-size:10px; left:460px; bottom:180px; animation-delay:2.4s; }
@keyframes heartFloat {
  0%   { opacity:0; transform:translateY(0) scale(0.5); }
  20%  { opacity:1; }
  100% { opacity:0; transform:translateY(-80px) scale(1.2); }
}

/* 캐릭터 */
.character {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 120px;
  width: 115px;
  animation: floating 3s ease-in-out infinite;
  filter: drop-shadow(0 12px 20px rgba(0,0,0,0.13));
}
.character img {
  width: 100%;
  height: auto;
  display: block;
  animation: sway 6s ease-in-out infinite;
}
@keyframes floating {
  0%   { bottom: 120px; }
  50%  { bottom: 148px; }
  100% { bottom: 120px; }
}
@keyframes sway {
  0%   { transform: rotate(-2deg); }
  50%  { transform: rotate(2deg); }
  100% { transform: rotate(-2deg); }
}

/* 캐릭터 그림자 (바닥) */
.char-shadow {
  position: absolute;
  left: 50%;
  bottom: 108px;
  transform: translateX(-50%);
  width: 70px;
  height: 12px;
  background: rgba(0,0,0,0.10);
  border-radius: 50%;
  animation: shadowPulse 3s ease-in-out infinite;
}
@keyframes shadowPulse {
  0%   { width:70px; opacity:0.10; }
  50%  { width:50px; opacity:0.05; }
  100% { width:70px; opacity:0.10; }
}

/* 로고 텍스트 */
.logo-fixed {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
}
.logo-en {
  font-family: 'Arial Black', sans-serif;
  font-size: 28px;
  font-weight: 900;
  color: #4a7fc1;
  letter-spacing: 4px;
}
.logo-ko {
  font-size: 13px;
  color: #bbb;
  letter-spacing: 3px;
  font-family: sans-serif;
  margin-top: 2px;
}
</style>
</head>
